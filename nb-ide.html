<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>NB IDE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;700&display=swap');

:root {
  --bg: #060610;
  --surface: #0e0e1a;
  --surface2: #161624;
  --border: #1e1e32;
  --text: #c8c8e0;
  --text2: #5a5a80;
  --accent: #ff6b2b;
  --accent2: #ff8f5e;
  --green: #4ade80;
  --red: #f87171;
  --blue: #60a5fa;
  --purple: #a78bfa;
  --yellow: #fbbf24;
  --cyan: #22d3ee;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --display: 'Space Grotesk', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

#app {
  display: grid;
  grid-template-rows: 42px 1fr 40px;
  height: 100dvh;
  height: 100vh;
}

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 10px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  z-index: 10;
}

.logo {
  font-family: var(--display);
  font-weight: 700;
  font-size: 16px;
  letter-spacing: -0.5px;
  color: var(--accent);
  user-select: none;
  flex-shrink: 0;
}
.logo span { color: var(--text2); font-weight: 300; font-size: 10px; margin-left: 4px; }

header nav { display: flex; gap: 4px; margin-left: auto; }

header button {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  padding: 5px 10px;
  border: 1px solid var(--border);
  border-radius: 5px;
  background: var(--surface2);
  color: var(--text);
  cursor: pointer;
  -webkit-appearance: none;
}
header button:active { border-color: var(--accent); color: var(--accent); }
header button.active { border-color: var(--accent); color: var(--accent); background: rgba(255,107,43,0.1); }

/* ── Main Area ── */
#main {
  position: relative;
  overflow: hidden;
}

/* ── Editor ── */
#editor-wrap {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  transition: transform 0.25s ease;
}

#editor-wrap.shifted { transform: translateX(-100%); }

.editor-container {
  flex: 1;
  position: relative;
  overflow: hidden;
}

#editor, .highlight-layer {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.6;
  padding: 8px 8px 8px 58px;
  white-space: pre;
  overflow: auto;
  tab-size: 2;
}

#editor {
  background: transparent;
  color: rgba(0,0,0,0);
  caret-color: #fff;
  border: none;
  outline: none;
  resize: none;
  z-index: 2;
  -webkit-text-fill-color: transparent;
}

.highlight-layer {
  pointer-events: none;
  z-index: 1;
  color: #e8e8f8;
  background: var(--bg);
}

.highlight-inner {
  min-height: 100%;
}

/* NB token colors — matching Opcode palette */
.highlight-layer .kw { color: #5cb8ff; font-weight: 700; }    /* keywords: func, export, if, else, end, block, loop, return */
.highlight-layer .op { color: #6fffb0; }                       /* operations: add, sub, mul, div, mod, eq, lt, gt, etc */
.highlight-layer .st { color: #ff8040; font-weight: 700; }     /* stack: push, pushf, pushd, get, set, tee, drop, dup */
.highlight-layer .mem { color: #22d3ee; }                      /* memory: load, store, load8, store8, fload, fstore */
.highlight-layer .num { color: #d9a0ff; }                      /* numbers */
.highlight-layer .cmt { color: #6a6a8a; }                      /* comments */
.highlight-layer .str { color: #ffe066; }                      /* strings */
.highlight-layer .typ { color: #fbbf24; }                      /* types: i32, f32, f64, void */
.highlight-layer .decl { color: #ff6b2b; font-weight: 700; }   /* declarations: param, local, global, extern */
.highlight-layer .flow { color: #f87171; }                      /* flow: branch, jump, call */
.highlight-layer .host { color: #a78bfa; }                     /* host_* functions */

/* Gutter (line nums + stack depth) */
.gutter-clip {
  position: absolute;
  top: 0; left: 0;
  width: 52px;
  height: 100%;
  overflow: hidden;
  z-index: 3;
  pointer-events: none;
  background: var(--bg);
  border-right: 1px solid var(--border);
}
.gutter-inner {
  display: flex;
}
.line-nums, .stack-depth {
  padding: 8px 0;
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.6;
  user-select: none;
  white-space: pre;
}
.line-nums {
  width: 26px;
  text-align: right;
  padding-right: 2px;
  color: var(--text2);
}
.stack-depth {
  width: 22px;
  text-align: center;
  padding-left: 2px;
}
.sd-ok { color: var(--green); }
.sd-warn { color: var(--yellow); }
.sd-err { color: var(--red); font-weight: 700; }
.sd-zero { color: var(--text2); }
.sd-na { color: transparent; }

/* ── Quick Insert Bar ── */
.qbar {
  display: flex;
  gap: 2px;
  padding: 4px 6px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  overflow-x: auto;
  flex-shrink: 0;
  -webkit-overflow-scrolling: touch;
}
.qbar::-webkit-scrollbar { display: none; }

.qbar button {
  font-family: var(--mono);
  font-size: 11px;
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface2);
  color: var(--text);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  -webkit-appearance: none;
}
.qbar button:active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ── Reference Panel ── */
#ref-panel {
  position: absolute;
  inset: 0;
  background: var(--bg);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 12px;
  transform: translateX(100%);
  transition: transform 0.25s ease;
  z-index: 5;
  visibility: hidden;
}

#ref-panel.open { transform: translateX(0); visibility: visible; }

#ref-panel h1 {
  font-family: var(--display);
  font-size: 18px;
  color: var(--accent);
  margin-bottom: 12px;
  font-weight: 700;
}

#ref-panel h2 {
  font-family: var(--display);
  font-size: 14px;
  color: var(--accent2);
  margin: 16px 0 6px 0;
  font-weight: 600;
}

#ref-panel p, #ref-panel li {
  font-size: 13px;
  line-height: 1.5;
  color: var(--text);
  margin-bottom: 6px;
}

#ref-panel ul { padding-left: 16px; }

#ref-panel code {
  font-family: var(--mono);
  font-size: 11px;
  background: var(--surface2);
  padding: 1px 4px;
  border-radius: 3px;
  color: #5cb8ff;
}

#ref-panel pre {
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1.5;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px;
  margin: 6px 0 10px 0;
  overflow-x: auto;
  color: var(--text);
}

#ref-panel .tip {
  color: var(--yellow);
  font-size: 12px;
  margin: 4px 0 8px 0;
}

#ref-panel .section {
  border-bottom: 1px solid var(--border);
  padding-bottom: 12px;
  margin-bottom: 4px;
}

#ref-panel .section:last-child { border-bottom: none; }

.ref-toc {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 14px;
}
.ref-toc button {
  font-family: var(--mono);
  font-size: 10px;
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface2);
  color: var(--text2);
  cursor: pointer;
  -webkit-appearance: none;
}
.ref-toc button:active { color: var(--accent); border-color: var(--accent); }

/* ── Footer ── */
footer {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 10px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text2);
}
footer .pos { margin-left: auto; }

/* ── Color Legend ── */
.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 6px 8px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  display: none;
}
.legend.show { display: flex; }
.legend span {
  font-family: var(--mono);
  font-size: 9px;
  padding: 2px 5px;
  border-radius: 3px;
  background: var(--surface2);
}
/* ── Trace Panel ── */
#trace-panel {
  display: none;
  flex-shrink: 0;
  max-height: 40vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  background: var(--surface);
  border-top: 2px solid var(--accent);
}
#trace-panel.open { display: block; }

.trace-row {
  display: flex;
  align-items: center;
  padding: 3px 6px;
  border-bottom: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 11px;
  gap: 4px;
  min-height: 24px;
  overflow: hidden;
}
.trace-row:nth-child(odd) { background: rgba(255,255,255,0.015); }
.trace-row .tr-line {
  color: var(--text2);
  width: 18px;
  text-align: right;
  flex-shrink: 0;
  font-size: 9px;
}
.trace-row .tr-instr {
  color: var(--text);
  width: 70px;
  flex-shrink: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-size: 10px;
}
.trace-row .tr-arrow {
  color: var(--text2);
  flex-shrink: 0;
  font-size: 9px;
}
.trace-row .tr-stack {
  color: var(--green);
  flex: 1;
  white-space: nowrap;
  overflow-x: auto;
  font-size: 11px;
  -webkit-overflow-scrolling: touch;
}
.trace-row .tr-stack .sv {
  display: inline-block;
  background: rgba(74,222,128,0.1);
  border: 1px solid rgba(74,222,128,0.25);
  border-radius: 3px;
  padding: 0 3px;
  margin: 0 1px;
  color: var(--green);
  font-size: 10px;
  line-height: 18px;
}
.trace-row .tr-stack .sv-new {
  background: rgba(74,222,128,0.25);
  border-color: var(--green);
  color: #fff;
}
.trace-row .tr-stack .sv-pop {
  background: rgba(248,113,113,0.15);
  border-color: rgba(248,113,113,0.3);
  color: var(--red);
  text-decoration: line-through;
  opacity: 0.5;
}
.trace-row.tr-empty .tr-stack { color: var(--text2); font-style: italic; }
.trace-row.tr-func {
  background: rgba(255,107,43,0.08);
  border-bottom: 1px solid rgba(255,107,43,0.2);
}
.trace-row.tr-func .tr-instr { color: var(--accent); font-weight: 700; }
.trace-sep {
  padding: 2px 8px;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text2);
  background: var(--surface2);
  text-transform: uppercase;
  letter-spacing: 1px;
}
</style>
</head>
<body>
<div id="app">

<header>
  <div class="logo">NB<span>IDE</span></div>
  <nav>
    <button id="btn-legend" onclick="toggleLegend()">◐</button>
    <button id="btn-trace" onclick="toggleTrace()">▶ Stack</button>
    <button id="btn-ref" onclick="toggleRef()">📖 Ref</button>
    <button id="btn-example" onclick="nextExample()">Ex ▾</button>
  </nav>
</header>

<div id="main">
  <div id="editor-wrap">
    <div class="legend" id="legend">
      <span style="color:#5cb8ff;font-weight:700">keyword</span>
      <span style="color:#6fffb0">operation</span>
      <span style="color:#ff8040">stack</span>
      <span style="color:#22d3ee">memory</span>
      <span style="color:#f87171">flow</span>
      <span style="color:#a78bfa">host</span>
      <span style="color:#ff6b2b;font-weight:700">decl</span>
      <span style="color:#fbbf24">type</span>
      <span style="color:#d9a0ff">number</span>
      <span style="color:#6a6a8a">comment</span>
    </div>
    <div class="editor-container">
      <div class="gutter-clip"><div class="gutter-inner" id="gutter-inner"><div class="line-nums" id="line-nums"></div><div class="stack-depth" id="stack-depth"></div></div></div>
      <div class="highlight-layer"><div class="highlight-inner" id="hl"></div></div>
      <textarea id="editor" spellcheck="false" autocapitalize="none" autocomplete="off" autocorrect="off"></textarea>
    </div>
    <div class="qbar">
      <button onclick="ins('push ')">push</button>
      <button onclick="ins('get ')">get</button>
      <button onclick="ins('set ')">set</button>
      <button onclick="ins('call ')">call</button>
      <button onclick="ins('add')">add</button>
      <button onclick="ins('sub')">sub</button>
      <button onclick="ins('mul')">mul</button>
      <button onclick="ins('if\n  \nend',4)">if</button>
      <button onclick="ins('block\nloop\n  \n  jump 0\nend\nend',7)">loop</button>
      <button onclick="ins('func  -> i32\n  \nend',5)">func</button>
      <button onclick="ins('load')">load</button>
      <button onclick="ins('store')">store</button>
      <button onclick="ins('drop')">drop</button>
      <button onclick="ins('return')">ret</button>
      <button onclick="ins('end')">end</button>
      <button onclick="ins('// ')">cmnt</button>
    </div>
    <div id="trace-panel">
      <div id="trace-content"></div>
    </div>
  </div>

  <div id="ref-panel"></div>
</div>

<footer>
  <span id="status">Ready</span>
  <span class="pos" id="cursor-pos">1:1</span>
</footer>

</div>

<script>
const editor = document.getElementById('editor');
const hl = document.getElementById('hl');
const lineNums = document.getElementById('line-nums');
const stackDepth = document.getElementById('stack-depth');
const gutterInner = document.getElementById('gutter-inner');
const refPanel = document.getElementById('ref-panel');
const editorWrap = document.getElementById('editor-wrap');

// ── NB Token Sets ──
const KW = new Set(['func','export','if','else','end','block','loop','return','local','global','global_get','global_set','memory','data']);
const STACK = new Set(['push','pushf','pushd','get','set','tee','drop','dup','pick','swap','over','nip','rot']);
const OPS = new Set(['add','sub','mul','div','mod','eq','ne','lt','gt','le','ge','eqz','and','or','xor','not','shl','shr','fadd','fsub','fmul','fdiv','feq','fne','flt','fgt','fle','fge','dadd','dsub','dmul','ddiv','deq','dne','dlt','dgt','dle','dge','i2f','f2i','i2d','f2d','d2f','d2i','band','bor','bxor','bnot','bshl','bshr','min','max','abs','neg','fneg','sqrt','fsqrt','ceil','floor','trunc','nearest','clz','ctz','popcnt','wrap','extend','reinterpret','copysign','fabs','fmin','fmax','select']);
const MEM = new Set(['load','load8','load16','store','store8','store16','fload','fstore','dload','dstore','grow','size']);
const FLOW = new Set(['branch','jump','call','call_indirect']);
const DECL = new Set(['param','local','global','extern','require','requires','init','public','name','version','category','description']);
const TYPES = new Set(['i32','i64','f32','f64','void']);

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlight(src) {
  const lines = src.split('\n');
  let html = '';
  for (let li = 0; li < lines.length; li++) {
    if (li > 0) html += '\n';
    const line = lines[li];
    let i = 0;
    while (i < line.length) {
      const ch = line[i];
      if (ch === ' ' || ch === '\t') { html += ch; i++; continue; }
      // Comment (// or header //)
      if (ch === '/' && line[i+1] === '/') {
        // Check if header comment with extern
        const rest = line.substring(i);
        if (/^\/\/\s*extern\b/.test(rest)) {
          html += '<span class="cmt">' + esc(rest) + '</span>';
        } else {
          html += '<span class="cmt">' + esc(rest) + '</span>';
        }
        break;
      }
      // Negative number
      if (ch === '-' && i+1 < line.length && line[i+1] >= '0' && line[i+1] <= '9') {
        let num = '-'; i++;
        while (i < line.length && ((line[i] >= '0' && line[i] <= '9') || line[i] === '.')) { num += line[i]; i++; }
        html += '<span class="num">' + num + '</span>';
        continue;
      }
      // Numbers
      if ((ch >= '0' && ch <= '9') || (ch === '.' && i+1 < line.length && line[i+1] >= '0' && line[i+1] <= '9')) {
        let num = '';
        while (i < line.length && ((line[i] >= '0' && line[i] <= '9') || line[i] === '.' || line[i] === 'x' || (line[i] >= 'a' && line[i] <= 'f') || (line[i] >= 'A' && line[i] <= 'F'))) { num += line[i]; i++; }
        html += '<span class="num">' + num + '</span>';
        continue;
      }
      // Strings
      if (ch === '"' || ch === "'") {
        let s = ch; i++;
        while (i < line.length && line[i] !== ch) { s += line[i]; i++; }
        if (i < line.length) { s += line[i]; i++; }
        html += '<span class="str">' + esc(s) + '</span>';
        continue;
      }
      // Words
      if ((ch >= 'a' && ch <= 'z') || (ch >= 'A' && ch <= 'Z') || ch === '_') {
        let w = '';
        while (i < line.length && ((line[i] >= 'a' && line[i] <= 'z') || (line[i] >= 'A' && line[i] <= 'Z') || (line[i] >= '0' && line[i] <= '9') || line[i] === '_')) { w += line[i]; i++; }
        if (w.startsWith('host_')) {
          html += '<span class="host">' + esc(w) + '</span>';
        } else if (KW.has(w)) {
          html += '<span class="kw">' + esc(w) + '</span>';
        } else if (STACK.has(w)) {
          html += '<span class="st">' + esc(w) + '</span>';
        } else if (OPS.has(w)) {
          html += '<span class="op">' + esc(w) + '</span>';
        } else if (MEM.has(w)) {
          html += '<span class="mem">' + esc(w) + '</span>';
        } else if (FLOW.has(w)) {
          html += '<span class="flow">' + esc(w) + '</span>';
        } else if (DECL.has(w)) {
          html += '<span class="decl">' + esc(w) + '</span>';
        } else if (TYPES.has(w)) {
          html += '<span class="typ">' + esc(w) + '</span>';
        } else {
          html += esc(w);
        }
        continue;
      }
      // Operators
      if ('<>->='.includes(ch)) {
        let op = ch; i++;
        if (i < line.length && (line[i] === '>' || line[i] === '=')) { op += line[i]; i++; }
        html += '<span class="op">' + esc(op) + '</span>';
        continue;
      }
      html += esc(ch);
      i++;
    }
  }
  return html;
}

function updateHighlight() {
  hl.innerHTML = highlight(editor.value);
  updateLineNums();
  updateStackDepth();
  updateTrace();
  updateCursorPos();
}

function updateLineNums() {
  const n = editor.value.split('\n').length;
  let h = '';
  for (let i = 1; i <= n; i++) h += i + '\n';
  lineNums.textContent = h;
}

// ── Stack Depth Tracker ──
// Instructions that affect stack depth
const PUSH_OPS = new Set(['push','pushf','pushd','get','global_get','load','load8','load16','fload','dload','dup','over','grow','size']);
const POP1_OPS = new Set(['set','tee','drop','eqz','not','bnot','i2f','f2i','i2d','f2d','d2f','d2i','neg','fneg','abs','fabs','sqrt','fsqrt','ceil','floor','trunc','nearest','clz','ctz','popcnt','wrap','extend','reinterpret','nip','global_set']);
// tee pops then pushes, net 0 — handle specially
const POP2_PUSH1 = new Set(['add','sub','mul','div','mod','eq','ne','lt','gt','le','ge','and','or','xor','shl','shr','fadd','fsub','fmul','fdiv','feq','fne','flt','fgt','fle','fge','dadd','dsub','dmul','ddiv','deq','dne','dlt','dgt','dle','dge','band','bor','bxor','bshl','bshr','min','max','fmin','fmax','copysign','rot','swap','select']);
const POP2_OPS = new Set(['store','store8','store16','fstore','dstore']); // consume 2, push 0

function analyzeStackDepth(src) {
  const lines = src.split('\n');
  const depths = [];
  let depth = 0;
  let inFunc = false;

  for (let i = 0; i < lines.length; i++) {
    const raw = lines[i].trim();
    // Strip comments
    const cmtIdx = raw.indexOf('//');
    const line = cmtIdx >= 0 ? raw.substring(0, cmtIdx).trim() : raw;
    if (!line) { depths.push(inFunc ? depth : null); continue; }

    const parts = line.split(/\s+/);
    const first = parts[0];

    // Function start — reset
    if (first === 'func' || (first === 'export' && parts[1] === 'func')) {
      inFunc = true;
      depth = 0;
      depths.push(depth);
      continue;
    }
    // End of func
    if (first === 'end' && inFunc) {
      depths.push(depth);
      // Could be block/loop end or func end — we don't deeply track nesting here
      continue;
    }
    if (!inFunc) { depths.push(null); continue; }

    // Params push onto the conceptual stack when accessed via 'get', not at declaration
    if (first === 'param' || first === 'local' || first === 'extern' || first === 'block' || first === 'loop') {
      depths.push(depth);
      continue;
    }
    if (first === 'if') { depth = Math.max(0, depth - 1); depths.push(depth); continue; }
    if (first === 'else' || first === 'return') { depths.push(depth); continue; }
    if (first === 'branch' || first === 'jump') { depths.push(depth); continue; }

    // Stack effects
    if (PUSH_OPS.has(first)) {
      depth++;
    } else if (first === 'tee') {
      // net 0: pops 1, pushes 1
    } else if (first === 'call') {
      // Rough: we don't know the callee signature, show ? or keep depth
      // For now assume it might push 1 or 0 — just show current
    } else if (POP1_OPS.has(first)) {
      depth = Math.max(0, depth - 1);
      if (first === 'tee') depth++; // tee leaves value
    } else if (POP2_PUSH1.has(first)) {
      depth = Math.max(0, depth - 1); // net -1
    } else if (POP2_OPS.has(first)) {
      depth = Math.max(0, depth - 2);
    } else if (first === 'set' || first === 'global_set') {
      depth = Math.max(0, depth - 1);
    }

    depths.push(depth);
  }
  return depths;
}

function updateStackDepth() {
  const depths = analyzeStackDepth(editor.value);
  let html = '';
  for (let i = 0; i < depths.length; i++) {
    const d = depths[i];
    if (d === null) {
      html += '<span class="sd-na">·</span>\n';
    } else if (d === 0) {
      html += '<span class="sd-zero">0</span>\n';
    } else if (d <= 2) {
      html += '<span class="sd-ok">' + d + '</span>\n';
    } else if (d <= 4) {
      html += '<span class="sd-warn">' + d + '</span>\n';
    } else {
      html += '<span class="sd-err">' + d + '</span>\n';
    }
  }
  stackDepth.innerHTML = html;
}

function updateTrace() {
  if (!traceOpen) return;
  const src = editor.value;
  const lines = src.split('\n');
  let html = '';
  let stack = [];
  let vars = {};
  let inFunc = false;
  let nestDepth = 0; // track block/loop/if nesting to know when func ends

  for (let li = 0; li < lines.length; li++) {
    const raw = lines[li].trim();
    const cmtIdx = raw.indexOf('//');
    const line = cmtIdx >= 0 ? raw.substring(0, cmtIdx).trim() : raw;
    if (!line) continue;

    const parts = line.split(/\s+/);
    const first = parts[0];

    // Function start
    if (first === 'func' || (first === 'export' && parts[1] === 'func')) {
      inFunc = true;
      stack = [];
      vars = {};
      nestDepth = 1;
      const fname = first === 'export' ? (parts[2] || '?') : (parts[1] || '?');
      html += '<div class="trace-sep">' + esc(fname) + '</div>';
      continue;
    }

    if (!inFunc) continue;

    if (first === 'param') { vars[parts[1] || '?'] = parts[1] || '?'; continue; }
    if (first === 'local') { vars[parts[1] || '?'] = '0'; continue; }
    if (first === 'extern') continue;

    // Track nesting
    if (first === 'block' || first === 'loop' || first === 'if') {
      nestDepth++;
    }
    if (first === 'end') {
      nestDepth--;
      if (nestDepth <= 0) {
        html += mkRow(li+1, 'end', stack, 0);
        inFunc = false;
        continue;
      }
      html += mkRow(li+1, 'end', stack, 0);
      continue;
    }

    // Stack operations
    let pushed = 0;

    if (first === 'push' || first === 'pushf' || first === 'pushd') {
      stack.push(parts[1] || '?');
      pushed = 1;
    } else if (first === 'get' || first === 'global_get') {
      const name = parts[1] || '?';
      const val = vars[name] !== undefined ? vars[name] : name;
      stack.push(val);
      pushed = 1;
    } else if (first === 'set' || first === 'global_set') {
      const name = parts[1] || '?';
      const val = stack.length ? stack.pop() : '?';
      vars[name] = val;
    } else if (first === 'tee') {
      const name = parts[1] || '?';
      vars[name] = stack.length ? stack[stack.length-1] : '?';
    } else if (first === 'drop') {
      if (stack.length) stack.pop();
    } else if (first === 'dup') {
      const v = stack.length ? stack[stack.length-1] : '?';
      stack.push(v);
      pushed = 1;
    } else if (first === 'swap') {
      if (stack.length >= 2) {
        const a = stack.pop(), b = stack.pop();
        stack.push(a); stack.push(b);
      }
    } else if (first === 'over') {
      if (stack.length >= 2) {
        stack.push(stack[stack.length-2]);
        pushed = 1;
      }
    } else if (first === 'if') {
      if (stack.length) stack.pop();
    } else if (POP2_PUSH1.has(first)) {
      const b = stack.length ? stack.pop() : '?';
      const a = stack.length ? stack.pop() : '?';
      stack.push(evalOp(first, a, b));
      pushed = 1;
    } else if (POP2_OPS.has(first)) {
      if (stack.length) stack.pop();
      if (stack.length) stack.pop();
    } else if (first === 'eqz') {
      const a = stack.length ? stack.pop() : '?';
      const r = a === '0' ? '1' : (a === '?' ? '?' : (isNaN(parseFloat(a)) ? a+'==0' : (parseFloat(a)===0?'1':'0')));
      stack.push(r);
      pushed = 1;
    } else if (first === 'call') {
      // Unknown signature — just push a result marker
      const fname = parts[1] || '?';
      stack.push(fname + '()');
      pushed = 1;
    } else if (first === 'branch') {
      // br_if pops the condition
      if (stack.length) stack.pop();
    } else if (first === 'jump') {
      // Don't modify stack
    } else if (first === 'return') {
      // Don't modify stack
    } else if (first === 'block' || first === 'loop') {
      // structural, no stack effect
    } else if (first === 'else') {
      // no stack effect
    } else if (PUSH_OPS.has(first) && first !== 'get' && first !== 'push' && first !== 'pushf' && first !== 'pushd' && first !== 'dup' && first !== 'over') {
      // load, load8 etc — pop addr, push value
      const addr = stack.length ? stack.pop() : '?';
      stack.push('[' + addr + ']');
      pushed = 1;
    } else if (POP1_OPS.has(first) && first !== 'set' && first !== 'drop' && first !== 'global_set' && first !== 'eqz') {
      // Unary ops: i2f, neg, etc
      const a = stack.length ? stack.pop() : '?';
      stack.push(evalUnary(first, a));
      pushed = 1;
    }

    html += mkRow(li+1, raw, stack, pushed);
  }

  document.getElementById('trace-content').innerHTML = html;
}

function evalOp(op, a, b) {
  const na = parseFloat(a), nb = parseFloat(b);
  if (!isNaN(na) && !isNaN(nb)) {
    switch(op) {
      case 'add': case 'fadd': case 'dadd': return ''+(na+nb);
      case 'sub': case 'fsub': case 'dsub': return ''+(na-nb);
      case 'mul': case 'fmul': case 'dmul': return ''+(na*nb);
      case 'div': case 'fdiv': case 'ddiv': return nb!==0 ? ''+(op==='div'?Math.trunc(na/nb):na/nb) : 'NaN';
      case 'mod': return nb!==0 ? ''+(na%nb) : 'NaN';
      case 'eq': case 'feq': case 'deq': return na===nb?'1':'0';
      case 'ne': case 'fne': case 'dne': return na!==nb?'1':'0';
      case 'lt': case 'flt': case 'dlt': return na<nb?'1':'0';
      case 'gt': case 'fgt': case 'dgt': return na>nb?'1':'0';
      case 'le': case 'fle': case 'dle': return na<=nb?'1':'0';
      case 'ge': case 'fge': case 'dge': return na>=nb?'1':'0';
      case 'and': return ''+(na&nb);
      case 'or': return ''+(na|nb);
      case 'xor': return ''+(na^nb);
      case 'shl': case 'bshl': return ''+(na<<nb);
      case 'shr': case 'bshr': return ''+(na>>nb);
      case 'min': case 'fmin': return ''+Math.min(na,nb);
      case 'max': case 'fmax': return ''+Math.max(na,nb);
      default: return '?';
    }
  }
  // Symbolic — keep it short
  const sym = opSym(op);
  // If either side is already compound (contains a space), simplify
  const aSimple = a.includes(' ') ? '(…)' : a;
  const bSimple = b.includes(' ') ? '(…)' : b;
  return aSimple + sym + bSimple;
}
function opSym(op) {
  const m = {
    add:'+', fadd:'+', dadd:'+',
    sub:'-', fsub:'-', dsub:'-',
    mul:'×', fmul:'×', dmul:'×',
    div:'/', fdiv:'/', ddiv:'/',
    mod:'%',
    eq:'==', feq:'==', deq:'==',
    ne:'!=', fne:'!=', dne:'!=',
    lt:'<', flt:'<', dlt:'<',
    gt:'>', fgt:'>', dgt:'>',
    le:'<=', fle:'<=', dle:'<=',
    ge:'>=', fge:'>=', dge:'>=',
    and:'&', or:'|', xor:'^',
    band:'&', bor:'|', bxor:'^',
    shl:'<<', shr:'>>', bshl:'<<', bshr:'>>',
    min:'min', max:'max', fmin:'min', fmax:'max'
  };
  return m[op] || op;
}
function evalUnary(op, a) {
  const n = parseFloat(a);
  if (isNaN(n)) return op+'('+a+')';
  switch(op) {
    case 'neg': case 'fneg': return ''+(-n);
    case 'abs': case 'fabs': return ''+Math.abs(n);
    case 'sqrt': case 'fsqrt': return ''+Math.sqrt(n);
    case 'i2f': case 'i2d': return ''+n;
    case 'f2i': case 'd2i': return ''+Math.trunc(n);
    case 'f2d': case 'd2f': return ''+n;
    case 'ceil': return ''+Math.ceil(n);
    case 'floor': return ''+Math.floor(n);
    case 'trunc': return ''+Math.trunc(n);
    case 'not': case 'bnot': return ''+(~n);
    default: return '?';
  }
}

function mkRow(lineNum, instr, stack, pushed) {
  let stackHtml = '';
  if (stack.length === 0) {
    stackHtml = '<span style="color:var(--text2);font-style:italic">empty</span>';
  } else {
    stackHtml = stack.map((v, i) => {
      const isNew = pushed > 0 && i >= stack.length - pushed;
      return '<span class="sv' + (isNew ? ' sv-new' : '') + '">' + esc(''+v) + '</span>';
    }).join(' ');
  }
  const cls = stack.length === 0 ? ' tr-empty' : '';
  return '<div class="trace-row' + cls + '">'
    + '<span class="tr-line">' + lineNum + '</span>'
    + '<span class="tr-instr">' + esc(instr.length > 16 ? instr.substring(0,15)+'…' : instr) + '</span>'
    + '<span class="tr-arrow">→</span>'
    + '<span class="tr-stack">' + stackHtml + '</span>'
    + '</div>';
}

function scrollToSection(id) {
  const el = document.getElementById('ref-' + id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

<p><code>eqz</code> pops ONE value, checks if zero.</p>
</div>

<div class="section" id="ref-ifelse">
<h2>If/Else</h2>
<pre>get x
push 10
gt           // x > 10?
if
  // true branch
else
  // false branch
end</pre>
</div>

<div class="section" id="ref-loops">
<h2>Loops</h2>
<pre>block
loop
  get i
  push 10
  ge
  branch 1     // break
  
  // body...
  
  get i
  push 1
  add
  set i
  jump 0       // continue
end
end</pre>
<p class="tip">⚠ jump 0 = restart loop, branch 1 = exit block (break), branch 0 inside loop = restart (NOT exit!)</p>
</div>

<div class="section" id="ref-mem">
<h2>Memory</h2>
<pre>push 100    // address
push 42     // value
store       // write 4 bytes

push 100
load        // read 4 bytes

push 100
push 65
store8      // write 1 byte

push 100
load8       // read 1 byte</pre>
<p class="tip">⚠ store eats TWO values (addr + val). #1 beginner mistake.</p>
</div>

<div class="section" id="ref-calls">
<h2>Calling Functions</h2>
<pre>push 5
call double     // result on stack

call get_count
drop            // discard return value</pre>
<p class="tip">⚠ If func returns a value, you MUST consume it (set/drop).</p>
<h2>Host Functions</h2>
<pre>// extern void host_draw_rect(i32,i32,i32,i32)

push 10
push 20
push 100
push 50
call host_draw_rect</pre>
<p class="tip">⚠ Forgot extern declaration = module fails to load. #1 bug.</p>
</div>

<div class="section" id="ref-floats">
<h2>Floats</h2>
<pre>pushf 3.14       // f32
pushd 1.0        // f64
fmul             // float multiply</pre>
<p>Float ops: <code>fadd fsub fmul fdiv feq flt</code></p>
<p>Double ops: <code>dadd dsub dmul ddiv deq dlt</code></p>
<p>Convert: <code>i2f f2i i2d f2d d2f</code></p>
<pre>local x f32      // float local
local y f64      // double local</pre>
</div>

<div class="section" id="ref-globals">
<h2>Globals</h2>
<pre>global counter 0
global pi 3.14 f32

global_get counter
push 1
add
global_set counter</pre>
</div>

<div class="section" id="ref-module">
<h2>Writing a Module</h2>
<pre>// name: mymodule
// version: 1
// category: system
// description: does stuff
// public: func_a func_b
// memory: 1
// requires: alloc
// init: my_init
// host:
// extern void host_do_thing(i32)</pre>
</div>

<div class="section" id="ref-patterns">
<h2>Common Patterns</h2>
<h2>Guard (early return)</h2>
<pre>get addr
push 1024
ge
if
  return
end</pre>
<h2>Safe branching return</h2>
<pre>local result
push -1
set result       // default
get key
push 0
eq
if
  push 42
  set result
end
get result       // always 1 value</pre>
<h2>Read-modify-write</h2>
<pre>push 0           // addr
push 0           // addr again
load             // read
push 1
add              // increment
store            // write back</pre>
</div>

<div class="section" id="ref-lessons">
<h2>Golden Rules</h2>
<p>Every instruction pushes or pops. Void func = stack empty at end. <code>-> i32</code> = exactly one value.</p>
<p class="tip">push = +1, set/drop = -1, add = -1, store = -2</p>

<h2>Top Bugs</h2>
<ul>
  <li>Missing <code>extern</code> declaration</li>
  <li>Forgot <code>drop</code> after call that returns</li>
  <li><code>branch 0</code> inside loop = restart, NOT exit</li>
  <li>Using <code>load</code> on float address (use <code>fload</code>)</li>
  <li>Wrong extern types (must be exact)</li>
  <li>Pool fills up — reset each frame</li>
</ul>

<h2>Memory Layout</h2>
<p>Plan before coding. Save 0-63 for metadata. Use round addresses for buffers. Prefix internal funcs with <code>_</code>.</p>
</div>
