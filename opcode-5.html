  'planet3d','surfx3d','surfy3d','surfz3d','upx3d','upy3d','upz3d','ppos3d','grav3d',
  'mdx','mdy','lockmouse'
]);
const OPS = new Set(['=','+','-','*','/','%','<','>','!','&','|','^','~',
  '==','!=','<=','>=','&&','||','+=','-=','*=','/=']);

function tokenize(src) {
  const tokens = [];
  let i = 0, line = 1, col = 1;

  while (i < src.length) {
    const ch = src[i];

    // Whitespace (not newline)
    if (ch === ' ' || ch === '\t' || ch === '\r') { i++; col++; continue; }

    // Newline
    if (ch === '\n') {
      if (tokens.length === 0 || tokens[tokens.length-1].type !== TT.NL)
        tokens.push({type: TT.NL, val: '\\n', line, col});
      i++; line++; col = 1; continue;
    }

    // Comments
    if (ch === '/' && src[i+1] === '/') {
      while (i < src.length && src[i] !== '\n') i++;
      continue;
    }

    // Comma at end = block open
    if (ch === ',') {
      tokens.push({type: TT.OPEN, val: ',', line, col});
      i++; col++; continue;
    }

    // Dot: block close if NOT followed by a digit (so 0.5 still works)
    if (ch === '.' && !(src[i+1] >= '0' && src[i+1] <= '9')) {
      // Check it's not mid-number (preceded by digit)
      // A close-dot appears at statement level: after newline, at start, or after whitespace
      tokens.push({type: TT.CLOSE, val: '.', line, col});
      i++; col++; continue;
    }

    // Numbers (including leading dot like .5)
    if (ch >= '0' && ch <= '9' || (ch === '.' && src[i+1] >= '0' && src[i+1] <= '9')) {
      let num = '';
      let hasDot = false;
      while (i < src.length && ((src[i] >= '0' && src[i] <= '9') || (src[i] === '.' && !hasDot))) {
        if (src[i] === '.') hasDot = true;
        num += src[i++]; col++;
      }
      tokens.push({type: TT.NUM, val: parseFloat(num), line, col});
      continue;
    }

    // Identifiers / Keywords
    if ((ch >= 'a' && ch <= 'z') || (ch >= 'A' && ch <= 'Z') || ch === '_') {
      let id = '';
      while (i < src.length && ((src[i] >= 'a' && src[i] <= 'z') || (src[i] >= 'A' && src[i] <= 'Z') ||
             (src[i] >= '0' && src[i] <= '9') || src[i] === '_')) {
        id += src[i++]; col++;
      }
      // Check for dot access: id.field
      if (i < src.length && src[i] === '.' && i+1 < src.length &&
          ((src[i+1] >= 'a' && src[i+1] <= 'z') || (src[i+1] >= 'A' && src[i+1] <= 'Z') || src[i+1] === '_')) {
        i++; col++; // skip dot
        let field = '';
        while (i < src.length && ((src[i] >= 'a' && src[i] <= 'z') || (src[i] >= 'A' && src[i] <= 'Z') ||
               (src[i] >= '0' && src[i] <= '9') || src[i] === '_')) {
          field += src[i++]; col++;
        }
        tokens.push({type: TT.DOT, val: id + '.' + field, inst: id, field: field, line, col});
      } else {
        tokens.push({type: KEYWORDS.has(id) ? TT.KW : TT.ID, val: id, line, col});
      }
      continue;
    }

    // Multi-char ops
    if (i + 1 < src.length && OPS.has(ch + src[i+1])) {
      tokens.push({type: TT.OP, val: ch + src[i+1], line, col});
      i += 2; col += 2; continue;
    }

    // Single-char ops
    if (OPS.has(ch)) {
      tokens.push({type: TT.OP, val: ch, line, col});
      i++; col++; continue;
    }

    // Semicolon = statement separator (treated as newline)
    if (ch === ';') {
      if (tokens.length === 0 || tokens[tokens.length-1].type !== TT.NL)
        tokens.push({type: TT.NL, val: '\\n', line, col});
      i++; col++; continue;
    }

    // Parentheses (kept only for math grouping)
    if (ch === '(' || ch === ')') {
      tokens.push({type: TT.PUNC, val: ch, line, col});
      i++; col++; continue;
    }

    // String literal
    if (ch === '"') {
      let s = ''; i++; col++;
      while (i < src.length && src[i] !== '"') { s += src[i++]; col++; }
      i++; col++;
      tokens.push({type: TT.STR, val: s, line, col});
      continue;
    }

    // Skip unknown
    i++; col++;
  }

  tokens.push({type: TT.EOF, val: '', line, col});
  return tokens;
}

// ╔══════════════════════════════════════════════════╗
// ║  PARSER — produces AST                           ║
// ╚══════════════════════════════════════════════════╝

function parse(tokens) {
  let pos = 0;
  let dataOffsets = {}; // tracks data statement offsets per array
  const peek = () => tokens[pos];
  const next = () => tokens[pos++];
  const expect = (type, val) => {
    const t = next();
    if (t.type !== type || (val !== undefined && t.val !== val))
      throw new Error(`Parse error at line ${t.line}: expected ${val||type}, got '${t.val}'`);
    return t;
  };
  const skipNL = () => { while (pos < tokens.length && peek().type === TT.NL) pos++; };
  const at = (type, val) => peek().type === type && (val === undefined || peek().val === val);

  // Known built-in functions (zero-arg and multi-arg)
  const BUILTIN_FNS = new Set(['rand','sqrt','sin','cos','tan','log','floor','ceil','abs','printnum','println','atan2','min','max','pow','round','randi','hsl','band','bor','bxor','bshl','bshr','hitcirc','hitrect','dist','collidex3d','collidez3d','surfx3d','surfy3d','surfz3d','upx3d','upy3d','upz3d','grav3d','mdx','mdy']);
  const ZERO_ARG_FNS = new Set(['rand','key','mousex','mousey','click','clear','println','dt','time','mdx','mdy']);
  // Track user-defined function names and param counts
  const userFns = new Set();
  const userFnParams = {};  // name → param count (cached)
  // Pre-scan for func declarations (iterate with index, not indexOf)
  for (let ti = 0; ti < tokens.length; ti++) {
    if (tokens[ti].type === TT.KW && tokens[ti].val === 'func') {
      if (ti + 1 < tokens.length && tokens[ti+1].type === TT.ID) {
        const fname = tokens[ti+1].val;
        userFns.add(fname);
        // Count params: identifiers/keywords between func name and comma
        let paramCount = 0;
        let pi = ti + 2;
        while (pi < tokens.length && (tokens[pi].type === TT.ID || tokens[pi].type === TT.KW) && tokens[pi].type !== TT.OPEN) { paramCount++; pi++; }
        userFnParams[fname] = paramCount;
      }
    }
  }

  function parseProgram() {
    const body = [];
    skipNL();
    while (!at(TT.EOF)) {
      body.push(parseTopLevel());
      skipNL();
    }
    return { type: 'Program', body };
  }

  function parseTopLevel() {
    skipNL();
    if (at(TT.KW, 'func')) return parseFn();
    if (at(TT.KW, 'let') || at(TT.KW, 'const')) return parseLet();
    if (at(TT.KW, 'export')) return parseExport();
    if (at(TT.KW, 'struct')) return parseStruct();
    if (at(TT.KW, 'array')) {
      next();
      const name = expect(TT.ID).val;
      const size = parseExpr();
      return { type: 'ArrayDecl', name, size };
    }
    throw new Error(`Parse error at line ${peek().line}: unexpected '${peek().val}'`);
  }

  function parseStruct() {
    expect(TT.KW, 'struct');
    const name = expect(TT.ID).val;
    const fields = [];
    while (!at(TT.NL) && !at(TT.EOF)) {
      fields.push(expect(TT.ID).val);
    }
    return { type: 'Struct', name, fields };
  }

  function parseFn() {
    expect(TT.KW, 'func');
    const name = expect(TT.ID).val;
    // Params: space-separated identifiers before the comma
    // Allow keywords as param names (e.g. len, min, max, fill, line)
    const params = [];
    while (!at(TT.OPEN) && !at(TT.NL) && !at(TT.EOF)) {
      const t = peek();
      if (t.type === TT.ID || t.type === TT.KW) {
        params.push(next().val);
      } else {
        break;
      }
    }
    expect(TT.OPEN); // the comma
    const body = parseBlock();
    expect(TT.CLOSE); // the dot
    return { type: 'Fn', name, params, body };
  }

  function parseBlock() {
    const stmts = [];
    skipNL();
    while (!at(TT.CLOSE) && !at(TT.EOF)) {
      stmts.push(parseStmt());
      skipNL();
    }
    return stmts;
  }

  function parseStmt() {
    skipNL();
    if (at(TT.KW, 'let') || at(TT.KW, 'const')) return parseLet();
    if (at(TT.KW, 'if')) return parseIf();
    if (at(TT.KW, 'loop') || at(TT.KW, 'while')) return parseLoop();
    if (at(TT.KW, 'for')) return parseFor();
    if (at(TT.KW, 'break')) { next(); return { type: 'Break' }; }
    if (at(TT.KW, 'return')) { next(); return { type: 'Return', val: at(TT.NL) || at(TT.CLOSE) ? null : parseExpr() }; }

    // Dot access assignment: ball.x = 5 or ball.x += 3
    if (at(TT.DOT)) {
      const tok = next();
      const inst = tok.inst, field = tok.field;
      if (at(TT.OP) && peek().val.endsWith('=')) {
        const op = next().val;
        if (op === '=') {
          return { type: 'StructPut', inst, field, value: parseExpr() };
        }
        const binOp = op.slice(0, -1);
        return { type: 'StructPut', inst, field, value: { type: 'BinOp', op: binOp, left: { type: 'StructOf', inst, field }, right: parseExpr() } };
      }
      // If no assignment, it's an expression statement (rare)
      return { type: 'ExprStmt', expr: { type: 'StructOf', inst, field } };
    }

    // Store/pixel: store expr = value
    if (at(TT.KW, 'store') || at(TT.KW, 'pixel')) {
      const kind = next().val;
      const index = parseMemIndex();
      expect(TT.OP, '=');
      const value = parseExpr();
      return { type: 'MemStore', kind, index, value };
    }

    // print — string literal or number
    if (at(TT.KW, 'print')) {
      next();
      if (at(TT.STR)) {
        // String literal: expand to individual char prints
        const str = next().val;
        const stmts = [];
        for (let ci = 0; ci < str.length; ci++) {
          stmts.push({ type: 'DrawCall', name: 'printchar', args: [{ type: 'NumLit', val: str.charCodeAt(ci) }] });
        }
        return { type: 'Block', stmts };
      }
      // Number expression: print as ASCII char
      const val = parseExpr();
      return { type: 'DrawCall', name: 'printchar', args: [val] };
    }

    // array name size
    if (at(TT.KW, 'array')) {
      next();
      const name = expect(TT.ID).val;
      const size = parseExpr();
      return { type: 'ArrayDecl', name, size };
    }

    // set arrayname index = value
    if (at(TT.KW, 'set')) {
      next();
      const name = expect(TT.ID).val;
      const index = parseMemIndex();
      expect(TT.OP, '=');
      const value = parseExpr();
      return { type: 'ArraySet', name, index, value };
    }

    // push arrayname value — append value to array
    if (at(TT.KW, 'push')) {
      next();
      const name = expect(TT.ID).val;
      const value = parseExpr();
      return { type: 'ArrayPush', name, value };
    }

    // data arrayname val val val ... OR data arrayname "string" — bulk load values
    if (at(TT.KW, 'data')) {
      next();
      const name = expect(TT.ID).val;
      const vals = [];
      // Check for string literal: data name "hello" → expands to ASCII codes + null terminator
      if (at(TT.STR)) {
        const str = next().val;
        for (let ci = 0; ci < str.length; ci++) {
          vals.push({ type: 'NumLit', val: str.charCodeAt(ci) });
        }
        vals.push({ type: 'NumLit', val: 0 }); // null terminator
      } else {
        while (!at(TT.NL) && !at(TT.EOF) && !at(TT.CLOSE)) {
          vals.push(parseExpr());
        }
      }
      // Track offset per array name
      if (!(name in dataOffsets)) dataOffsets[name] = 0;
      const stmts = [];
      for (let vi = 0; vi < vals.length; vi++) {
        stmts.push({ type: 'ArraySet', name, index: { type: 'NumLit', val: dataOffsets[name] + vi }, value: vals[vi] });
      }
      dataOffsets[name] += vals.length;
      return { type: 'Block', stmts };
    }

    // put instance field = value  OR  put instance field += value
    if (at(TT.KW, 'put')) {
      next();
      const inst = expect(TT.ID).val;
      const field = expect(TT.ID).val;
      const op = next(); // = or += -= *= /=
      if (op.val === '=') {
        const value = parseExpr();
        return { type: 'StructPut', inst, field, value };
      }
      // Compound: put p x += expr  →  put p x = (of p x) + expr
      const binOp = op.val.slice(0, -1); // '+=' → '+'
      const rhs = parseExpr();
      const value = { type: 'BinOp', op: binOp, left: { type: 'StructOf', inst, field }, right: rhs };
      return { type: 'StructPut', inst, field, value };
    }

    // free instance
    if (at(TT.KW, 'free')) {
      next();
      const inst = expect(TT.ID).val;
      return { type: 'StructFree', inst };
    }

    // Drawing: clear
    if (at(TT.KW, 'clear')) { next(); return { type: 'DrawCall', name: 'clear', args: [] }; }

    // showpad — show mobile d-pad
    if (at(TT.KW, 'showpad')) { next(); return { type: 'DrawCall', name: 'showpad', args: [] }; }

    // fill r g b
    if (at(TT.KW, 'fill')) {
      next();
      const r = parseExpr(), g = parseExpr(), b = parseExpr();
      return { type: 'DrawCall', name: 'fill', args: [r, g, b] };
    }

    // alpha a — set fill opacity (0..1)
    if (at(TT.KW, 'alpha')) {
      next();
      const a = parseExpr();
      return { type: 'DrawCall', name: 'alpha', args: [a] };
    }

    // stroke w — set line width
    if (at(TT.KW, 'stroke')) {
      next();
      const w = parseExpr();
      return { type: 'DrawCall', name: 'stroke', args: [w] };
    }

    // rect x y w h
    if (at(TT.KW, 'rect')) {
      next();
      const x = parseExpr(), y = parseExpr(), w = parseExpr(), h = parseExpr();
      return { type: 'DrawCall', name: 'rect', args: [x, y, w, h] };
    }

    // circle x y r
    if (at(TT.KW, 'circle')) {
      next();
      const x = parseExpr(), y = parseExpr(), r = parseExpr();
      return { type: 'DrawCall', name: 'circle', args: [x, y, r] };
    }

    // line x1 y1 x2 y2
    if (at(TT.KW, 'line')) {
      next();
      const x1 = parseExpr(), y1 = parseExpr(), x2 = parseExpr(), y2 = parseExpr();
      return { type: 'DrawCall', name: 'line', args: [x1, y1, x2, y2] };
    }

    // text x y charcode charcode ...
    // Expands to multiple draw_text(x+offset, y, char) calls
    if (at(TT.KW, 'text')) {
      next();
      const x = parseExpr(), y = parseExpr();
      const chars = [];
      while (!at(TT.NL) && !at(TT.EOF) && !at(TT.CLOSE)) {
        chars.push(parseExpr());
      }
      // Return a block of individual draw_text calls
      const stmts = [];
      for (let ci = 0; ci < chars.length; ci++) {
        const xOff = ci === 0 ? x : { type: 'BinOp', op: '+', left: x, right: { type: 'NumLit', val: ci * 10 } };
        stmts.push({ type: 'DrawCall', name: 'drawtext', args: [xOff, y, chars[ci]] });
      }
      return { type: 'Block', stmts };
    }

    // printnum val
    if (at(TT.KW, 'printnum')) {
      next();
      const val = parseExpr();
      return { type: 'DrawCall', name: 'printnum', args: [val] };
    }

    // drawnum x y val — draw a number on canvas at x,y
    if (at(TT.KW, 'drawnum')) {
      next();
      const x = parseExpr(), y = parseExpr(), val = parseExpr();
      return { type: 'DrawCall', name: 'drawnum', args: [x, y, val] };
    }

    // clearinput id — clear an input box's content
    if (at(TT.KW, 'clearinput')) {
      next();
      const id = parseExpr();
      return { type: 'DrawCall', name: 'clearinput', args: [id] };
    }

    // beep freq duration — play a sine beep
    if (at(TT.KW, 'beep')) {
      next();
      const freq = parseExpr(), dur = parseExpr();
      return { type: 'DrawCall', name: 'beep', args: [freq, dur] };
    }

    // tone freq duration type — play a tone (0=sine 1=square 2=saw 3=tri)
    if (at(TT.KW, 'tone')) {
      next();
      const freq = parseExpr(), dur = parseExpr(), kind = parseExpr();
      return { type: 'DrawCall', name: 'tone', args: [freq, dur, kind] };
    }

    // drawtext arrayname x y — draw string from array of ASCII codes
    if (at(TT.KW, 'drawtext')) {
      next();
      const name = expect(TT.ID).val;
      const x = parseExpr(), y = parseExpr();
      return { type: 'DrawText', name, x, y };
    }

    // println
    if (at(TT.KW, 'println')) {
      next();
      return { type: 'DrawCall', name: 'println', args: [] };
    }

    // switch expr, case val, ... . case val, ... . .
    if (at(TT.KW, 'switch')) {
      next();
      const expr = parseExpr();
      expect(TT.OPEN); // comma opens switch block
      skipNL();
      const cases = [];
      let defaultBody = null;
      while (!at(TT.CLOSE) && !at(TT.EOF)) {
        skipNL();
        if (at(TT.KW, 'case')) {
          next();
          const val = parseExpr();
          expect(TT.OPEN);
          const body = parseBlock();
          expect(TT.CLOSE);
          cases.push({ val, body });
        } else if (at(TT.KW, 'else')) {
          next();
          expect(TT.OPEN);
          defaultBody = parseBlock();
          expect(TT.CLOSE);
        }
        skipNL();
      }
      expect(TT.CLOSE); // dot closes switch block
      return { type: 'Switch', expr, cases, default: defaultBody };
    }

    // strcmp arr1 arr2 — compare two string arrays
    if (at(TT.KW, 'strcmp')) {
      next();
      const a = expect(TT.ID).val;
      const b = expect(TT.ID).val;
      return { type: 'ExprStmt', expr: { type: 'StrCmp', a, b } };
    }

    // substr src dest off len — copy substring
    if (at(TT.KW, 'substr')) {
      next();
      const src = expect(TT.ID).val;
      const dest = expect(TT.ID).val;
      const off = parseExpr();
      const len = parseExpr();
      return { type: 'SubStr', src, dest, off, len };
    }

    // hsl h s l — set fill color from HSL
    if (at(TT.KW, 'hsl')) {
      next();
      const h = parseExpr(), s = parseExpr(), l = parseExpr();
      return { type: 'DrawCall', name: 'hsl', args: [h, s, l] };
    }

    // tri x1 y1 x2 y2 x3 y3 — filled triangle
    if (at(TT.KW, 'tri')) {
      next();
      const x1 = parseExpr(), y1 = parseExpr(), x2 = parseExpr(), y2 = parseExpr(), x3 = parseExpr(), y3 = parseExpr();
      return { type: 'DrawCall', name: 'tri', args: [x1, y1, x2, y2, x3, y3] };
    }

    // oval x y rx ry — filled ellipse
    if (at(TT.KW, 'oval')) {
      next();
      const x = parseExpr(), y = parseExpr(), rx = parseExpr(), ry = parseExpr();
      return { type: 'DrawCall', name: 'oval', args: [x, y, rx, ry] };
    }

    // arc x y r start end — arc/pie slice (angles in radians)
    if (at(TT.KW, 'arc')) {
      next();
      const x = parseExpr(), y = parseExpr(), r = parseExpr(), start = parseExpr(), end = parseExpr();
      return { type: 'DrawCall', name: 'arc', args: [x, y, r, start, end] };
    }

    // rgba r g b a — set fill color with alpha in one call
    if (at(TT.KW, 'rgba')) {
      next();
      const r = parseExpr(), g = parseExpr(), b = parseExpr(), a = parseExpr();
      return { type: 'DrawCall', name: 'rgba', args: [r, g, b, a] };
    }

    // sprite id w h data... — define a sprite from inline pixel data (RGBA values)
    if (at(TT.KW, 'sprite')) {
      next();
      const id = parseExpr(), w = parseExpr(), h = parseExpr();
      const vals = [];
      while (!at(TT.NL) && !at(TT.EOF) && !at(TT.CLOSE)) {
        vals.push(parseExpr());
      }
      return { type: 'SpriteDefine', id, w, h, vals };
    }

    // spr id x y  OR  spr id x y scale — draw a sprite
    if (at(TT.KW, 'spr')) {
      next();
      const id = parseExpr(), x = parseExpr(), y = parseExpr();
      let scale = null;
      if (!at(TT.NL) && !at(TT.EOF) && !at(TT.CLOSE) && !at(TT.KW)) {
        scale = parseExpr();
      }
      if (!scale) scale = { type: 'NumLit', val: 1 };
      return { type: 'DrawCall', name: 'spr', args: [id, x, y, scale] };
    }

    // drawstr x y "string" — draw a string literal on canvas
    if (at(TT.KW, 'drawstr')) {
      next();
      const x = parseExpr(), y = parseExpr();
      if (at(TT.STR)) {
        const str = next().val;
        return { type: 'DrawStr', x, y, str };
      }
      // If not a string literal, treat as array name
      const name = expect(TT.ID).val;
      return { type: 'DrawText', name, x, y };
    }

    // camera cx cy — set camera offset for all subsequent drawing
    if (at(TT.KW, 'camera')) {
      next();
      const cx = parseExpr(), cy = parseExpr();
      return { type: 'DrawCall', name: 'camera', args: [cx, cy] };
    }

    // play arrayname tempo — play note sequence from array as looping BGM
    if (at(TT.KW, 'play')) {
      next();
      const name = expect(TT.ID).val;
      const tempo = parseExpr();
      return { type: 'Play', name, tempo };
    }

    // frame id frameNum — set which animation frame to show for a sprite
    if (at(TT.KW, 'frame')) {
      next();
      const id = parseExpr(), frameNum = parseExpr();
      return { type: 'DrawCall', name: 'frame', args: [id, frameNum] };
    }

    // 3D commands — all map to DrawCall with 3d_ prefix imports
    if (at(TT.KW, 'mode3d')) { next(); return { type: 'DrawCall', name: 'mode3d', args: [] }; }
    if (at(TT.KW, 'clear3d')) { next(); return { type: 'DrawCall', name: 'clear3d', args: [] }; }
    if (at(TT.KW, 'box3d')) {
      next();
      const w = parseExpr(), h = parseExpr(), d = parseExpr();
      return { type: 'DrawCall', name: 'box3d', args: [w, h, d] };
    }
    if (at(TT.KW, 'sphere3d')) {
      next();
      const r = parseExpr();
      return { type: 'DrawCall', name: 'sphere3d', args: [r] };
    }
    if (at(TT.KW, 'cyl3d')) {
      next();
      const r = parseExpr(), h = parseExpr();
      return { type: 'DrawCall', name: 'cyl3d', args: [r, h] };
    }
    if (at(TT.KW, 'pos3d')) {
      next();
      const x = parseExpr(), y = parseExpr(), z = parseExpr();
      return { type: 'DrawCall', name: 'pos3d', args: [x, y, z] };
    }
    if (at(TT.KW, 'rot3d')) {
      next();
      const rx = parseExpr(), ry = parseExpr(), rz = parseExpr();
      return { type: 'DrawCall', name: 'rot3d', args: [rx, ry, rz] };
    }
    if (at(TT.KW, 'scale3d')) {
      next();
      const sx = parseExpr(), sy = parseExpr(), sz = parseExpr();
      return { type: 'DrawCall', name: 'scale3d', args: [sx, sy, sz] };
    }
    if (at(TT.KW, 'color3d')) {
      next();
      const r = parseExpr(), g = parseExpr(), b = parseExpr();
      return { type: 'DrawCall', name: 'color3d', args: [r, g, b] };
    }
    if (at(TT.KW, 'cam3d')) {
      next();
      const x = parseExpr(), y = parseExpr(), z = parseExpr();
      return { type: 'DrawCall', name: 'cam3d', args: [x, y, z] };
    }
    if (at(TT.KW, 'lookat3d')) {
      next();
      const x = parseExpr(), y = parseExpr(), z = parseExpr();
      return { type: 'DrawCall', name: 'lookat3d', args: [x, y, z] };
    }
    if (at(TT.KW, 'light3d')) {
      next();
      const x = parseExpr(), y = parseExpr(), z = parseExpr();
      return { type: 'DrawCall', name: 'light3d', args: [x, y, z] };
    }
    if (at(TT.KW, 'fog3d')) {
      next();
      const r = parseExpr(), g = parseExpr(), b = parseExpr();
      return { type: 'DrawCall', name: 'fog3d', args: [r, g, b] };
    }
    if (at(TT.KW, 'ground3d')) {
      next();
      const w = parseExpr(), d = parseExpr();
      return { type: 'DrawCall', name: 'ground3d', args: [w, d] };
    }
    if (at(TT.KW, 'city3d')) {
      next();
      const gx = parseExpr(), gz = parseExpr(), bs = parseExpr();
      return { type: 'DrawCall', name: 'city3d', args: [gx, gz, bs] };
    }
    if (at(TT.KW, 'terrain3d')) {
      next();
      const w = parseExpr(), d = parseExpr(), hills = parseExpr();
      return { type: 'DrawCall', name: 'terrain3d', args: [w, d, hills] };
    }
    if (at(TT.KW, 'forest3d')) {
      next();
      const w = parseExpr(), d = parseExpr(), density = parseExpr();
      return { type: 'DrawCall', name: 'forest3d', args: [w, d, density] };
    }
    if (at(TT.KW, 'track3d')) {
      next();
      const shape = parseExpr(), laps = parseExpr();
      return { type: 'DrawCall', name: 'track3d', args: [shape, laps] };
    }
    if (at(TT.KW, 'ocean3d')) {
      next();
      const w = parseExpr(), d = parseExpr(), wh = parseExpr(), ws = parseExpr();
      return { type: 'DrawCall', name: 'ocean3d', args: [w, d, wh, ws] };
    }
    if (at(TT.KW, 'space3d')) {
      next();
      const stars = parseExpr();
      return { type: 'DrawCall', name: 'space3d', args: [stars] };
    }
    if (at(TT.KW, 'house3d')) {
      next();
      const w = parseExpr(), d = parseExpr(), floors = parseExpr();
      return { type: 'DrawCall', name: 'house3d', args: [w, d, floors] };
    }
    if (at(TT.KW, 'planet3d')) {
      next();
      const r = parseExpr(), trees = parseExpr();
      return { type: 'DrawCall', name: 'planet3d', args: [r, trees] };
    }
    if (at(TT.KW, 'ppos3d')) {
      next();
      const x = parseExpr(), y = parseExpr(), z = parseExpr();
      return { type: 'DrawCall', name: 'ppos3d', args: [x, y, z] };
    }
    if (at(TT.KW, 'lockmouse')) {
      next();
      return { type: 'DrawCall', name: 'lockmouse', args: [] };
    }

    // Assignment or expression
    const expr = parseExpr();
    if (expr.type === 'Ident' && at(TT.OP) && peek().val.endsWith('=')) {
      const op = next().val;
      const rhs = parseExpr();
      if (op === '=') return { type: 'Assign', name: expr.name, value: rhs };
      const binOp = op.slice(0, -1);
      return { type: 'Assign', name: expr.name, value: { type: 'BinOp', op: binOp, left: expr, right: rhs } };
    }
    return { type: 'ExprStmt', expr };
  }

  // Parse memory index: everything up to '=' for store
  // Handles: base, base + 1, i * STRIDE, i * STRIDE + 3
  function parseMemIndex() {
    let left = parseMemMul();
    while (at(TT.OP, '+') || at(TT.OP, '-')) {
      // Peek ahead: if this is "store base + 1 = ...", the + is part of the index
      // But we must NOT consume past '='
      const op = next().val;
      const right = parseMemMul();
      left = { type: 'BinOp', op, left, right };
    }
    return left;
  }

  function parseMemMul() {
    let left = parseMemAtom();
    while (at(TT.OP, '*')) {
      next();
      const right = parseMemAtom();
      left = { type: 'BinOp', op: '*', left, right };
    }
    return left;
  }

  function parseMemAtom() {
    if (at(TT.NUM)) return { type: 'NumLit', val: next().val };
    if (at(TT.ID)) return { type: 'Ident', name: next().val };
    if (at(TT.PUNC, '(')) {
      next();
      const expr = parseExpr();
      expect(TT.PUNC, ')');
      return expr;
    }
    // Allow multiplied expressions like i * STRIDE
    throw new Error(`Parse error at line ${peek().line}: expected memory index, got '${peek().val}'`);
  }

  function parseLet() {
    const isConst = at(TT.KW, 'const');
    next(); // consume 'let' or 'const'
    const name = expect(TT.ID).val;
    expect(TT.OP, '=');
    
    // Check for: let x = new structname val val val
    if (at(TT.KW, 'new')) {
      next();
      const structName = expect(TT.ID).val;
      // Read optional init values until end of line
      const initVals = [];
      while (!at(TT.NL) && !at(TT.EOF) && !at(TT.CLOSE)) {
        initVals.push(parseExpr());
      }
      if (initVals.length === 0) {
        return { type: 'Let', name, value: { type: 'StructNew', name: structName }, constant: isConst };
      }
      // Expand: let x = new obj a b c  →  Block { let x = new obj; x.f0 = a; x.f1 = b; x.f2 = c }
      // We need struct field names — look them up from pre-scanned structs
      const stmts = [];
      stmts.push({ type: 'Let', name, value: { type: 'StructNew', name: structName }, constant: isConst });
      // Field names will be resolved at compile time — for now store as StructInitPut
      for (let vi = 0; vi < initVals.length; vi++) {
        stmts.push({ type: 'StructInitPut', inst: name, fieldIndex: vi, value: initVals[vi], structName });
      }
      return { type: 'Block', stmts };
    }
    
    const value = parseExpr();
    return { type: 'Let', name, value, constant: isConst };
  }

  function parseIf() {
    expect(TT.KW, 'if');
    const cond = parseExpr();
    expect(TT.OPEN); // comma
    const then = parseBlock();
    expect(TT.CLOSE); // dot
    let elseBody = null;
    skipNL();
    if (at(TT.KW, 'elif')) {
      // elif desugars to else if
      elseBody = [parseElif()];
    } else if (at(TT.KW, 'else')) {
      next();
      if (at(TT.KW, 'if')) {
        elseBody = [parseIf()];
      } else {
        expect(TT.OPEN); // comma
        elseBody = parseBlock();
        expect(TT.CLOSE); // dot
      }
    }
    return { type: 'If', cond, then, else: elseBody };
  }

  function parseElif() {
    expect(TT.KW, 'elif');
    const cond = parseExpr();
    expect(TT.OPEN);
    const then = parseBlock();
    expect(TT.CLOSE);
    let elseBody = null;
    skipNL();
    if (at(TT.KW, 'elif')) {
      elseBody = [parseElif()];
    } else if (at(TT.KW, 'else')) {
      next();
      if (at(TT.KW, 'if')) {
        elseBody = [parseIf()];
      } else {
        expect(TT.OPEN);
        elseBody = parseBlock();
        expect(TT.CLOSE);
      }
    }
    return { type: 'If', cond, then, else: elseBody };
  }

  function parseLoop() {
    next(); // consume 'loop' or 'while'
    const cond = at(TT.OPEN) ? { type: 'NumLit', val: 1 } : parseExpr();
    expect(TT.OPEN); // comma
    const body = parseBlock();
    expect(TT.CLOSE); // dot
    return { type: 'Loop', cond, body };
  }

  // for i 0 to 100,  OR  for i 0 to 100 step 2,
  function parseFor() {
    expect(TT.KW, 'for');
    const varName = expect(TT.ID).val;
    const from = parseExpr();
    expect(TT.KW, 'to');
    const to = parseExpr();
    let stepVal = { type: 'NumLit', val: 1 };
    if (at(TT.KW, 'step')) {
      next();
      stepVal = parseExpr();
    }
    expect(TT.OPEN); // comma
    const body = parseBlock();
    expect(TT.CLOSE); // dot
    // Expand into: Block { Let, Loop { body..., Assign i=i+step } }
    const increment = { type: 'Assign', name: varName, value: { type: 'BinOp', op: '+', left: { type: 'Ident', name: varName }, right: stepVal } };
    const loopBody = body.concat([increment]);
    const cond = { type: 'BinOp', op: '<', left: { type: 'Ident', name: varName }, right: to };
    return { type: 'Block', stmts: [
      { type: 'Let', name: varName, value: from, constant: false },
      { type: 'Loop', cond, body: loopBody }
    ]};
  }

  function parseExport() {
    expect(TT.KW, 'export');
    const name = expect(TT.ID).val;
    return { type: 'Export', name };
  }

  // ── Expression parser (precedence climbing) ──
  function parseExpr() { return parseOr(); }

  function parseOr() {
    let left = parseAnd();
    while (at(TT.OP, '||') || at(TT.KW, 'or')) {
      next(); left = { type: 'BinOp', op: '||', left, right: parseAnd() };
    }
    return left;
  }

  function parseAnd() {
    let left = parseEquality();
    while (at(TT.OP, '&&') || at(TT.KW, 'and')) {
      next(); left = { type: 'BinOp', op: '&&', left, right: parseEquality() };
    }
    return left;
  }

  function parseEquality() {
    let left = parseComparison();
    while (at(TT.OP, '==') || at(TT.OP, '!=')) {
      const op = next().val;
      left = { type: 'BinOp', op, left, right: parseComparison() };
    }
    return left;
  }

  function parseComparison() {
    let left = parseAddSub();
    while (at(TT.OP, '<') || at(TT.OP, '>') || at(TT.OP, '<=') || at(TT.OP, '>=')) {
      const op = next().val;
      left = { type: 'BinOp', op, left, right: parseAddSub() };
    }
    return left;
  }

  function parseAddSub() {
    let left = parseMulDiv();
    while (at(TT.OP, '+') || at(TT.OP, '-')) {
      const op = next().val;
      left = { type: 'BinOp', op, left, right: parseMulDiv() };
    }
    return left;
  }

  function parseMulDiv() {
    let left = parseUnary();
    while (at(TT.OP, '*') || at(TT.OP, '/') || at(TT.OP, '%')) {
      const op = next().val;
      left = { type: 'BinOp', op, left, right: parseUnary() };
    }
    return left;
  }

  function parseUnary() {
    if (at(TT.OP, '-')) { next(); return { type: 'UnaryOp', op: '-', expr: parseUnary() }; }
    if (at(TT.OP, '!') || at(TT.KW, 'not')) { next(); return { type: 'UnaryOp', op: '!', expr: parseUnary() }; }
    return parseAtom();
  }

  function parseAtom() {
    // Number
    if (at(TT.NUM)) return { type: 'NumLit', val: next().val };

    // Dot access expression: ball.x
    if (at(TT.DOT)) {
      const tok = next();
      return { type: 'StructOf', inst: tok.inst, field: tok.field };
    }

    // Parenthesized (still allowed for math grouping)
    if (at(TT.PUNC, '(')) {
      next();
      const expr = parseExpr();
      expect(TT.PUNC, ')');
      return expr;
    }

    // pick cond a b — ternary (returns a if cond nonzero, else b)
    if (at(TT.KW, 'pick')) {
      next();
      const cond = parseExpr();
      const a = parseExpr();
      const b = parseExpr();
      return { type: 'Pick', cond, a, b };
    }

    // Memory load: load expr (tight — only grabs mul-level, not additive)
    if (at(TT.KW, 'load')) {
      next();
      const index = parseMemMul();
      return { type: 'MemLoad', index };
    }

    // get arrayname index
    if (at(TT.KW, 'get')) {
      next();
      const name = expect(TT.ID).val;
      const index = parseMemMul();
      return { type: 'ArrayGet', name, index };
    }

    // len arrayname
    if (at(TT.KW, 'len')) {
      next();
      const name = expect(TT.ID).val;
      return { type: 'ArrayLen', name };
    }

    // pop arrayname — remove and return last element
    if (at(TT.KW, 'pop')) {
      next();
      const name = expect(TT.ID).val;
      return { type: 'ArrayPop', name };
    }

    // new structname [val val val...]
    if (at(TT.KW, 'new')) {
      next();
      const name = expect(TT.ID).val;
      return { type: 'StructNew', name };
    }

    // of instance field
    if (at(TT.KW, 'of')) {
      next();
      const inst = expect(TT.ID).val;
      const field = expect(TT.ID).val;
      return { type: 'StructOf', inst, field };
    }

    // Input: zero-arg builtins that return values
    if (at(TT.KW, 'key')) { next(); return { type: 'Call', name: 'key', args: [] }; }
    if (at(TT.KW, 'mousex')) { next(); return { type: 'Call', name: 'mousex', args: [] }; }
    if (at(TT.KW, 'mousey')) { next(); return { type: 'Call', name: 'mousey', args: [] }; }
    if (at(TT.KW, 'click')) { next(); return { type: 'Call', name: 'click', args: [] }; }
    if (at(TT.KW, 'width')) { next(); return { type: 'Call', name: 'width', args: [] }; }
    if (at(TT.KW, 'height')) { next(); return { type: 'Call', name: 'height', args: [] }; }
    if (at(TT.KW, 'dt')) { next(); return { type: 'Call', name: 'dt', args: [] }; }
    if (at(TT.KW, 'time')) { next(); return { type: 'Call', name: 'time', args: [] }; }

    // down keycode — check if key is held
    if (at(TT.KW, 'down')) {
      next();
      const code = parseExpr();
      return { type: 'Call', name: 'down', args: [code] };
    }

    // press x y w h — returns 1 if clicked inside rect
    if (at(TT.KW, 'press')) {
      next();
      const x = parseExpr(), y = parseExpr(), w = parseExpr(), h = parseExpr();
      return { type: 'Call', name: 'press', args: [x, y, w, h] };
    }

    // input id — returns numeric value of input box
    if (at(TT.KW, 'input')) {
      next();
      const id = parseExpr();
      return { type: 'Call', name: 'input', args: [id] };
    }

    // Identifier or function call
    if (at(TT.ID) || at(TT.KW)) {
      const name = next().val;

      // atan2 — two-arg math builtin: atan2 y x
      if (name === 'atan2') {
        const y = parseUnary();
        const x = parseUnary();
        return { type: 'Call', name: 'atan2', args: [y, x] };
      }

      // min/max/pow — two-arg math builtins
      if (name === 'min' || name === 'max' || name === 'pow') {
        const a = parseUnary();
        const b = parseUnary();
        return { type: 'Call', name, args: [a, b] };
      }

      // randi min max — random integer in range
      if (name === 'randi') {
        const a = parseUnary();
        const b = parseUnary();
        return { type: 'Call', name: 'randi', args: [a, b] };
      }

      // band/bor/bxor/bshl/bshr — bitwise ops (two args)
      if (name === 'band' || name === 'bor' || name === 'bxor' || name === 'bshl' || name === 'bshr') {
        const a = parseUnary();
        const b = parseUnary();
        return { type: 'Call', name, args: [a, b] };
      }

      // strcmp arr1 arr2 — compare string arrays, returns 1 if equal
      if (name === 'strcmp') {
        const a = expect(TT.ID).val;
        const b = expect(TT.ID).val;
        return { type: 'StrCmp', a, b };
      }

      // strlen arrname — length of null-terminated string in array
      if (name === 'strlen') {
        const a = expect(TT.ID).val;
        return { type: 'StrLen', a };
      }

      // hitcirc x1 y1 r1 x2 y2 r2 — circle-circle collision
      if (name === 'hitcirc') {
        const x1 = parseExpr(), y1 = parseExpr(), r1 = parseExpr();
        const x2 = parseExpr(), y2 = parseExpr(), r2 = parseExpr();
        return { type: 'Call', name: 'hitcirc', args: [x1, y1, r1, x2, y2, r2] };
      }

      // hitrect x1 y1 w1 h1 x2 y2 w2 h2 — rect-rect collision
      if (name === 'hitrect') {
        const x1 = parseExpr(), y1 = parseExpr(), w1 = parseExpr(), h1 = parseExpr();
        const x2 = parseExpr(), y2 = parseExpr(), w2 = parseExpr(), h2 = parseExpr();
        return { type: 'Call', name: 'hitrect', args: [x1, y1, w1, h1, x2, y2, w2, h2] };
      }

      // dist x1 y1 x2 y2 — distance between two points
      if (name === 'dist') {
        const x1 = parseExpr(), y1 = parseExpr();
        const x2 = parseExpr(), y2 = parseExpr();
        return { type: 'Call', name: 'dist', args: [x1, y1, x2, y2] };
      }

      // collidex3d x z r — returns corrected x after collision
      if (name === 'collidex3d') {
        const x = parseExpr(), z = parseExpr(), r = parseExpr();
        return { type: 'Call', name: 'collidex3d', args: [x, z, r] };
      }

      // collidez3d x z r — returns corrected z after collision
      if (name === 'collidez3d') {
        const x = parseExpr(), z = parseExpr(), r = parseExpr();
        return { type: 'Call', name: 'collidez3d', args: [x, z, r] };
      }

      // surfx3d/surfy3d/surfz3d x y z — snap to planet surface
      if (name === 'surfx3d' || name === 'surfy3d' || name === 'surfz3d') {
        const x = parseExpr(), y = parseExpr(), z = parseExpr();
        return { type: 'Call', name, args: [x, y, z] };
      }

      // upx3d/upy3d/upz3d x y z — up vector at position
      if (name === 'upx3d' || name === 'upy3d' || name === 'upz3d') {
        const x = parseExpr(), y = parseExpr(), z = parseExpr();
        return { type: 'Call', name, args: [x, y, z] };
      }

      // grav3d x y z — gravitational pull toward nearest planet
      if (name === 'grav3d') {
        const x = parseExpr(), y = parseExpr(), z = parseExpr();
        return { type: 'Call', name: 'grav3d', args: [x, y, z] };
      }

      // Known function — zero-arg call (like rand) or with args
      if (BUILTIN_FNS.has(name) || userFns.has(name)) {
        const args = [];
        if (ZERO_ARG_FNS.has(name)) {
          return { type: 'Call', name, args: [] };
        }
        // Math builtins grab tight arg (atom/unary)
        const MATH_FNS = new Set(['sqrt','sin','cos','tan','log','floor','ceil','abs','round']);
        if (MATH_FNS.has(name)) {
          if (!at(TT.NL) && !at(TT.EOF) && !at(TT.OPEN) && !at(TT.CLOSE) &&
              !at(TT.OP, '=') && !at(TT.KW)) {
            args.push(parseUnary());
          }
        } else if (userFns.has(name)) {
          // User functions: use cached param count
          const paramCount = userFnParams[name] || 0;
          for (let ai = 0; ai < paramCount; ai++) {
            if (!at(TT.NL) && !at(TT.EOF) && !at(TT.CLOSE)) {
              args.push(parseExpr());
            }
          }
        } else {
          // Other builtins: single expr
          if (!at(TT.NL) && !at(TT.EOF) && !at(TT.OPEN) && !at(TT.CLOSE) &&
              !at(TT.OP, '=') && !at(TT.KW)) {
            args.push(parseExpr());
          }
        }
        return { type: 'Call', name, args };
      }

      return { type: 'Ident', name };
    }

    throw new Error(`Parse error at line ${peek().line}: unexpected '${peek().val}'`);
  }

  return parseProgram();
}

// ╔══════════════════════════════════════════════════╗
// ║  WASM BINARY EMITTER                             ║
// ║  Emits raw WASM bytecode — no WAT intermediate   ║
// ╚══════════════════════════════════════════════════╝

// WASM opcodes
const OP = {
  unreachable: 0x00, nop: 0x01, block: 0x02, loop: 0x03, if: 0x04, else: 0x05,
  end: 0x0b, br: 0x0c, br_if: 0x0d, return: 0x0f, call: 0x10,
  drop: 0x1a, select: 0x1b,
  local_get: 0x20, local_set: 0x21, local_tee: 0x22,
  global_get: 0x23, global_set: 0x24,
  f64_load: 0x2b, f64_store: 0x39,
  memory_size: 0x3f, memory_grow: 0x40,
  i32_const: 0x41, i64_const: 0x42, f32_const: 0x43, f64_const: 0x44,
  i32_eqz: 0x45, i32_eq: 0x46, i32_ne: 0x47,
  i32_lt_s: 0x48, i32_gt_s: 0x4a, i32_le_s: 0x4c, i32_ge_s: 0x4e,
  f64_eq: 0x61, f64_ne: 0x62, f64_lt: 0x63, f64_gt: 0x64, f64_le: 0x65, f64_ge: 0x66,
  f64_abs: 0x99, f64_neg: 0x9a, f64_ceil: 0x9b, f64_floor: 0x9c,
  f64_sqrt: 0x9f, f64_add: 0xa0, f64_sub: 0xa1, f64_mul: 0xa2, f64_div: 0xa3,
  f64_min: 0xa4, f64_max: 0xa5,
  i32_trunc_f64_s: 0xaa,
  f64_convert_i32_s: 0xb7,
  i32_and: 0x71, i32_or: 0x72, i32_xor: 0x73, i32_shl: 0x74, i32_shr_s: 0x75, i32_shr_u: 0x76,
};

// WASM type constants
const WASM = {
  f64: 0x7c, f32: 0x7d, i64: 0x7e, i32: 0x7f,
  funcref: 0x70, extern: 0x6f,
  func: 0x60, void: 0x40,
  MAGIC: [0x00, 0x61, 0x73, 0x6d],
  VERSION: [0x01, 0x00, 0x00, 0x00],
};

class WasmEmitter {
  constructor() {
    this.bytes = [];
  }

  // ── Encoding helpers ──
  byte(b) { this.bytes.push(b & 0xff); }
  bytes_(arr) { for (const b of arr) this.byte(b); }

  // LEB128 encodings
  u32(val) {
    val = val >>> 0;
    do {
      let b = val & 0x7f;
      val >>>= 7;
      if (val) b |= 0x80;
      this.byte(b);
    } while (val);
  }

  s32(val) {
    val = val | 0;
    let more = true;
    while (more) {
      let b = val & 0x7f;
      val >>= 7;
      if ((val === 0 && !(b & 0x40)) || (val === -1 && (b & 0x40))) more = false;
      else b |= 0x80;
      this.byte(b);
    }
  }

  f64(val) {
    const buf = new ArrayBuffer(8);
    new Float64Array(buf)[0] = val;
    const view = new Uint8Array(buf);
    for (let i = 0; i < 8; i++) this.byte(view[i]);
  }

  str(s) {
    const encoded = new TextEncoder().encode(s);
    this.u32(encoded.length);
    this.bytes_(encoded);
  }

  // Section: id + size-prefixed content
  section(id, contentFn) {
    this.byte(id);
    const tmp = new WasmEmitter();
    contentFn(tmp);
    this.u32(tmp.bytes.length);
    this.bytes_(tmp.bytes);
  }

  // Vector: count-prefixed items
  vec(items, emitFn) {
    this.u32(items.length);
    for (const item of items) emitFn(this, item);
  }

  toBuffer() { return new Uint8Array(this.bytes); }
}

// ╔══════════════════════════════════════════════════╗
// ║  CODE GENERATOR                                  ║
// ║  AST → WASM binary                               ║
// ╚══════════════════════════════════════════════════╝

function compile(ast) {
  // Collect all top-level info
  const globals = {};   // name → { index, mutable, initVal }
  const functions = {};  // name → { index, params, locals, ast }
  const exports = [];
  let globalCount = 0;

  // Imported functions from JS
  const imports = [
    // Math (0-8)
    { module: 'env', name: 'rand', params: [], result: WASM.f64 },

          const st = structs[node.name];
          if (!st) throw new Error(`Unknown struct: ${node.name}`);
          emitF64(st.id);
          emitCall('st_new');
          break;
        }

        case 'StructOf': {
          emitGetVar(node.inst);
          emitF64(fieldIdx(node.field));
          emitCall('st_of');
          break;
        }

        case 'MemLoad':
          // load[index] → f64.load from memory at index*8
          emitExpr(node.index);
          e.byte(OP.i32_trunc_f64_s); // convert index to i32
          e.byte(OP.i32_const); e.s32(3); // multiply by 8 (shift left 3)
          // i32.shl
          e.bytes_([0x74]);
          e.byte(OP.f64_load);
          e.byte(3); // alignment (2^3 = 8)
          e.u32(0);  // offset
          break;

        case 'Pick':
          emitExpr(node.a);
          emitExpr(node.b);
          emitExpr(node.cond);
          emitF64(0);
          e.byte(OP.f64_ne);
          e.byte(OP.select);
          break;

        case 'StrCmp': {
          emitF64(arrId(node.a));
          emitF64(0);
          emitF64(arrId(node.b));
          emitF64(0);
          emitCall('str_cmp');
          break;
        }

        case 'StrLen': {
          emitF64(arrId(node.a));
          emitF64(0);
          emitCall('str_len');
          break;
        }

        default:
          throw new Error(`Cannot emit expression: ${node.type}`);
      }
    }

    // ── Emit statement ──
    function emitStmt(node) {
      switch (node.type) {
        case 'Let':
        case 'Assign': {
          const name = node.name;
          if (node.type === 'Let' && node.constant) constVars.add(name);
          if (node.type === 'Assign' && (constVars.has(name) || globalConsts.has(name))) {
            throw new Error(`Cannot reassign const '${name}'`);
          }
          emitExpr(node.value);
          emitSetVar(name);
          break;
        }

        case 'MemStore': {
          emitExpr(node.index);
          e.byte(OP.i32_trunc_f64_s);
          e.byte(OP.i32_const); e.s32(3);
          e.bytes_([0x74]); // i32.shl
          if (node.kind === 'pixel') {
            e.byte(OP.i32_const); e.s32(1048576);
            e.bytes_([0x6a]); // i32.add
          }
          emitExpr(node.value);
          e.byte(OP.f64_store);
          e.byte(3); e.u32(0);
          break;
        }

        case 'If':
          emitExpr(node.cond);
          emitF64(0);
          e.byte(OP.f64_ne);
          e.byte(OP.if); e.byte(WASM.void);
          breakDepth++;
          for (const s of node.then) emitStmt(s);
          if (node.else) {
            e.byte(OP.else);
            for (const s of node.else) emitStmt(s);
          }
          breakDepth--;
          e.byte(OP.end);
          break;

        case 'Loop':
          // block { loop { br_if(cond==false, block_end) ... br loop } }
          e.byte(OP.block); e.byte(WASM.void);  // outer block (break target)
          e.byte(OP.loop); e.byte(WASM.void);   // inner loop
          // Evaluate condition
          emitExpr(node.cond);
          emitF64(0);
          e.byte(OP.f64_eq);
          e.byte(OP.br_if); e.u32(1);
          const savedBreakDepth = breakDepth;
          breakDepth = 0;
          for (const s of node.body) emitStmt(s);
          breakDepth = savedBreakDepth;
          e.byte(OP.br); e.u32(0);
          e.byte(OP.end); e.byte(OP.end);
          break;

        case 'Break':
          e.byte(OP.br); e.u32(1 + breakDepth);
          break;

        case 'Return':
          if (node.val) emitExpr(node.val);
          e.byte(OP.return);
          break;

        case 'ArrayDecl': {
          let aid;
          if (arrays[node.name] && typeof arrays[node.name] === 'object') {
            aid = arrays[node.name].id;
          } else {
            aid = arrayCount++;
            arrays[node.name] = { id: aid };
          }
          emitF64(aid);
          emitExpr(node.size);
          emitCall('arr_new');
          break;
        }

        case 'ArraySet': {
          emitF64(arrId(node.name));
          emitExpr(node.index);
          emitExpr(node.value);
          emitCall('arr_set');
          break;
        }

        case 'ArrayPush': {
          emitF64(arrId(node.name));
          emitExpr(node.value);
          emitCall('arr_push');
          break;
        }

        case 'StructPut': {
          emitGetVar(node.inst);
          emitF64(fieldIdx(node.field));
          emitExpr(node.value);
          emitCall('st_put');
          break;
        }

        case 'StructFree': {
          emitGetVar(node.inst);
          emitCall('st_free');
          break;
        }

        case 'StructInitPut': {
          emitGetVar(node.inst);
          emitF64(node.fieldIndex);
          emitExpr(node.value);
          emitCall('st_put');
          break;
        }

        case 'DrawCall': {
          const drawMap = {
            'clear':'draw_clear','fill':'draw_fill','rect':'draw_rect','circle':'draw_circle',
            'line':'draw_line','drawtext':'draw_text','printchar':'print',
            'printnum':'printnum','println':'println','drawnum':'draw_num','clearinput':'ui_clearinput',
            'alpha':'draw_alpha','stroke':'draw_stroke','beep':'snd_beep','tone':'snd_tone',
            'showpad':'ui_showpad','hsl':'draw_hsl','tri':'draw_tri','oval':'draw_oval',
            'arc':'draw_arc','rgba':'draw_rgba','spr':'spr_draw',
            'camera':'draw_camera','frame':'spr_frame',
            'mode3d':'td_mode','clear3d':'td_clear','box3d':'td_box','sphere3d':'td_sphere',
            'cyl3d':'td_cyl','pos3d':'td_pos','rot3d':'td_rot','scale3d':'td_scale',
            'color3d':'td_color','cam3d':'td_cam','lookat3d':'td_lookat',
            'light3d':'td_light','fog3d':'td_fog','ground3d':'td_ground',
            'city3d':'td_city',
            'terrain3d':'td_terrain','forest3d':'td_forest','track3d':'td_track',
            'ocean3d':'td_ocean','space3d':'td_space','house3d':'td_house',
            'planet3d':'td_planet','ppos3d':'td_ppos',
            'lockmouse':'ui_lockmouse'
          };
          for (const arg of node.args) emitExpr(arg);
          if (drawMap[node.name]) emitCall(drawMap[node.name]);
          break;
        }

        case 'DrawText': {
          emitF64(arrId(node.name));
          emitF64(0);
          emitExpr(node.x);
          emitExpr(node.y);
          emitCall('draw_str');
          break;
        }

        case 'DrawStr': {
          // drawstr x y "string" — allocate temp array, fill with chars, call draw_strl
          const strArrId = arrayCount++;
          const chars = node.str;
          emitF64(strArrId);
          emitF64(chars.length + 1);
          emitCall('arr_new');
          for (let ci = 0; ci < chars.length; ci++) {
            emitF64(strArrId);
            emitF64(ci);
            emitF64(chars.charCodeAt(ci));
            emitCall('arr_set');
          }
          emitF64(strArrId);
          emitF64(chars.length);
          emitF64(0); // null terminator
          emitCall('arr_set');
          emitExpr(node.x);
          emitExpr(node.y);
          emitF64(strArrId);
          emitCall('draw_strl');
          break;
        }

        case 'Play': {
          emitF64(arrId(node.name));
          emitExpr(node.tempo);
          emitCall('snd_play');
          break;
        }

        case 'Block':
          for (const s of node.stmts) emitStmt(s);
          break;

        case 'ExprStmt':
          emitExpr(node.expr);
          // If the expression produces a value, drop it
          if (node.expr.type === 'Call') {
            const name = node.expr.name;
            const returningBuiltins = new Set(['rand','sqrt','sin','cos','tan','log','floor','ceil','abs','atan2','min','max','pow','round','key','mousex','mousey','click','width','height','dt','down','press','input','randi','band','bor','bxor','bshl','bshr','time']);
            if (returningBuiltins.has(name) || (name in functions && functions[name].returnsValue)) {
              e.byte(OP.drop);
            }
          }
          // These expression types always produce a value on the stack
          const alwaysValue = new Set(['StrCmp','StrLen','ArrayGet','ArrayLen','ArrayPop','StructOf','MemLoad','Pick','StructNew','NumLit','Ident','BinOp','UnaryOp']);
          if (alwaysValue.has(node.expr.type)) {
            e.byte(OP.drop);
          }
          break;

        case 'Switch': {
          // Compile as chain of if/else
          emitExpr(node.expr);
          const swIdx = node._localIdx;
          e.byte(OP.local_set); e.u32(swIdx);
          
          // Emit as nested if/else chain
          for (let ci = 0; ci < node.cases.length; ci++) {
            e.byte(OP.local_get); e.u32(swIdx);
            emitExpr(node.cases[ci].val);
            e.byte(OP.f64_eq);
            e.byte(OP.if); e.byte(WASM.void);
            breakDepth++;
            for (const s of node.cases[ci].body) emitStmt(s);
            breakDepth--;
            if (ci < node.cases.length - 1 || node.default) {
              e.byte(OP.else);
            }
          }
          if (node.default) {
            for (const s of node.default) emitStmt(s);
          }
          // Close all the if/else blocks
          for (let ci = 0; ci < node.cases.length; ci++) {
            e.byte(OP.end);
          }
          break;
        }

        case 'SubStr': {
          emitF64(arrId(node.src));
          emitF64(0);
          emitF64(arrId(node.dest));
          emitExpr(node.off);
          emitExpr(node.len);
          emitCall('str_sub');
          break;
        }

        case 'SpriteDefine': {
          const sprArrId = arrayCount++;
          const pixelCount = node.vals.length;
          emitF64(sprArrId);
          emitF64(pixelCount);
          emitCall('arr_new');
          for (let vi = 0; vi < pixelCount; vi++) {
            emitF64(sprArrId);
            emitF64(vi);
            emitExpr(node.vals[vi]);
            emitCall('arr_set');
          }
          emitExpr(node.id);
          emitExpr(node.w);
          emitExpr(node.h);
          emitF64(sprArrId);
          emitF64(pixelCount);
          emitCall('spr_def');
          break;
        }

        default:
          throw new Error(`Cannot emit statement: ${node.type}`);
      }
    }

    for (const stmt of fn.body) emitStmt(stmt);
    e.byte(OP.end); // end function body

    return { body: e.toBuffer(), localDecl: additionalLocals };
  }

  // ╔══════════════════════════════════════════════════╗
  // ║  ASSEMBLE WASM MODULE                            ║
  // ╚══════════════════════════════════════════════════╝

  const mod = new WasmEmitter();

  // Magic + version
  mod.bytes_(WASM.MAGIC);
  mod.bytes_(WASM.VERSION);

  // Section 1: Type
  mod.section(1, e => {
    e.u32(typeSignatures.length);
    for (const sig of typeSignatures) {
      e.byte(WASM.func);
      e.u32(sig.params.length);
      for (const p of sig.params) e.byte(p);
      if (sig.result) { e.u32(1); e.byte(sig.result); }
      else e.u32(0);
    }
  });

  // Section 2: Import
  mod.section(2, e => {
    e.u32(imports.length + 1); // +1 for memory
    for (const imp of imports) {
      e.str(imp.module);
      e.str(imp.name);
      e.byte(0x00); // func
      e.u32(imp.typeIndex);
    }
    // Import memory
    e.str('env'); e.str('memory');
    e.byte(0x02); // memory
    e.byte(0x00); // limits: no max
    e.u32(256);   // 256 pages = 16MB
  });

  // Section 3: Function (declare all user functions)
  const fnNames = Object.keys(functions);
  mod.section(3, e => {
    e.u32(fnNames.length);
    for (const fname of fnNames) {
      e.u32(functions[fname].typeIndex);
    }
  });

  // Section 5: Global
  if (globalCount > 0) {
    mod.section(6, e => {
      e.u32(globalCount);
      for (const name in globals) {
        const g = globals[name];
        e.byte(WASM.f64);     // type
        e.byte(0x01);         // always mutable in WASM (const enforced at compile time)
        // Init expression
        e.byte(OP.f64_const);
        // Evaluate constant init value
        if (g.initVal.type === 'NumLit') {
          e.f64(g.initVal.val);
        } else if (g.initVal.type === 'UnaryOp' && g.initVal.op === '-' && g.initVal.expr.type === 'NumLit') {
          e.f64(-g.initVal.expr.val);
        } else {
          e.f64(0); // non-constant inits default to 0
        }
        e.byte(OP.end);
      }
    });
  }

  // Section 7: Export
  mod.section(7, e => {
    const validExports = exports.filter(name => name in functions);
    e.u32(validExports.length);
    for (const name of validExports) {
      e.str(name);
      e.byte(0x00); // func
      e.u32(functions[name].index);
    }
  });

  // Section 10: Code
  const compiledBodies = {};
  for (const fname of fnNames) {
    compiledBodies[fname] = compileFnBody(functions[fname]);
  }

  mod.section(10, e => {
    e.u32(fnNames.length);
    for (const fname of fnNames) {
      const body = compiledBodies[fname].body;
      e.u32(body.length);
      e.bytes_(body);
    }
  });

  return mod.toBuffer();
}

// ╔══════════════════════════════════════════════════╗
// ║  RUNTIME — instantiate + run                     ║
// ╚══════════════════════════════════════════════════╝

function log_console(msg) {
  consoleOut.textContent += msg + '\n';
  consoleOut.scrollTop = consoleOut.scrollHeight;
}

function disassemble(buffer) {
  // Simple hex dump + section overview
  let out = `WASM Binary — ${buffer.length} bytes\n`;
  out += `────────────────────────────────────\n`;

  // Verify magic
  const magic = Array.from(buffer.slice(0, 4)).map(b => b.toString(16).padStart(2, '0')).join(' ');
  const version = Array.from(buffer.slice(4, 8)).map(b => b.toString(16).padStart(2, '0')).join(' ');
  out += `Magic:   ${magic}\n`;
  out += `Version: ${version}\n\n`;

  // Hex dump (first 512 bytes)
  const limit = Math.min(buffer.length, 512);
  for (let i = 0; i < limit; i += 16) {
    const hex = Array.from(buffer.slice(i, Math.min(i + 16, limit)))
      .map(b => b.toString(16).padStart(2, '0')).join(' ');
    const ascii = Array.from(buffer.slice(i, Math.min(i + 16, limit)))
      .map(b => (b >= 32 && b < 127) ? String.fromCharCode(b) : '.').join('');
    out += `${i.toString(16).padStart(6, '0')}  ${hex.padEnd(48)}  ${ascii}\n`;
  }
  if (buffer.length > 512) out += `\n... ${buffer.length - 512} more bytes\n`;
  return out;
}

let _pendingClick = 0, _pendingClickX = 0, _pendingClickY = 0;
let _mouseX = 0, _mouseY = 0;
let _mouseDX = 0, _mouseDY = 0;
let _clicked = 0, _clickX = 0, _clickY = 0;
const _keys = {};
let _lastKey = 0;
let _deltaTime = 0.016;

async function compile_and_run() {
  stop_running();
  consoleOut.textContent = '';
  const src = editor.value;

  statusText.textContent = 'compiling...';
  statusDot.style.background = 'var(--yellow)';

  let wasmBuffer;
  let ast;
  const t0 = performance.now();

  try {
    const tokens = tokenize(src);
    ast = parse(tokens);
    wasmBuffer = compile(ast);
  } catch (err) {
    let msg = err.message;
    // "Did you mean...?" suggestions
    const unexpMatch = msg.match(/unexpected '(\w+)'/);
    const undefMatch = msg.match(/Undefined variable: (\w+)/);
    const unkFnMatch = msg.match(/Unknown function: (\w+)/);
    const unkFieldMatch = msg.match(/Unknown field: (\w+)/);
    const unkArrMatch = msg.match(/Unknown array: (\w+)/);
    const typo = unexpMatch ? unexpMatch[1] : undefMatch ? undefMatch[1] : unkFnMatch ? unkFnMatch[1] : unkFieldMatch ? unkFieldMatch[1] : unkArrMatch ? unkArrMatch[1] : null;
    if (typo && typo.length >= 2) {
      const allWords = Array.from(OPCODE_KW);
      // Also collect user identifiers
      const userRe = /\b([a-zA-Z_]\w*)\b/g; let um;
      while ((um = userRe.exec(src)) !== null) { if (!OPCODE_KW.has(um[1])) allWords.push(um[1]); }
      // Find closest match by edit distance
      function editDist(a, b) {
        const m = a.length, n = b.length;
        const d = Array.from({length:m+1},(_,i) => {const r=new Uint8Array(n+1);r[0]=i;return r;});
        for (let j=1;j<=n;j++) d[0][j]=j;
        for (let i=1;i<=m;i++) for(let j=1;j<=n;j++) d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]!==b[j-1]?1:0));
        return d[m][n];
      }
      let best = null, bestDist = 3;
      for (const w of allWords) {
        if (w === typo) continue;
        const dist = editDist(typo.toLowerCase(), w.toLowerCase());
        if (dist < bestDist) { bestDist = dist; best = w; }
      }
      if (best) msg += ` — did you mean '${best}'?`;
    }
    compileInfo.innerHTML = `<span class="err">✗ ${msg}</span>`;
    statusText.textContent = 'compile error';
    statusDot.style.background = 'var(--red)';
    log_console(`[ERROR] ${msg}`);
    // Extract line number from error message ("at line N")
    const lineMatch = err.message.match(/at line (\d+)/);
    if (lineMatch) {
      setErrorLine(parseInt(lineMatch[1]));
      // Scroll editor to error line
      const lines = editor.value.split('\n');
      let pos = 0;
      for (let i = 0; i < Math.min(parseInt(lineMatch[1]) - 1, lines.length); i++) pos += lines[i].length + 1;
      editor.selectionStart = editor.selectionEnd = pos;
      editor.blur(); editor.focus();
    }
    return;
  }

  const compileTime = (performance.now() - t0).toFixed(1);
  wasmSize.textContent = `${wasmBuffer.length} bytes`;
  compileInfo.innerHTML = `<span class="ok">✓ compiled in ${compileTime}ms — ${wasmBuffer.length} bytes</span>`;
  clearError();

  // Show disassembly
  wasmOut.textContent = disassemble(wasmBuffer);

  // Instantiate
  try {
    wasmMemory = new WebAssembly.Memory({ initial: 256 }); // 16MB

    // ── Runtime state ──
    const _arrays = {};    // id → Float64Array
    const _structs = {};   // structId → { fieldCount }
    const _instances = {}; // ptr → Float64Array (fields)
    let _nextPtr = 1;
    let _fillColor = 'rgb(255,255,255)';
    const _inputs = {};    // id → HTMLInputElement
    const _sprites = {};   // id → HTMLCanvasElement (offscreen sprite)
    const _startTime = performance.now();
    let _camX = 0, _camY = 0; // camera offset

    // Use AbortController to cleanly remove all listeners on stop
    if (window._runAbort) window._runAbort.abort();
    window._runAbort = new AbortController();
    const _sig = { signal: window._runAbort.signal };

    // Input listeners — prevent default on arrow keys and space when running
    document.addEventListener('keydown', e => {
      _keys[e.keyCode] = true; _lastKey = e.keyCode;
      if (running && (e.keyCode >= 32 && e.keyCode <= 40)) { e.preventDefault(); }
    }, _sig);
    document.addEventListener('keyup', e => { _keys[e.keyCode] = false; }, _sig);

    // Track mouse position on canvas + pointer lock deltas
    canvasOut.addEventListener('mousemove', e => { const r = canvasOut.getBoundingClientRect(); _mouseX = e.clientX - r.left; _mouseY = e.clientY - r.top; _mouseDX += e.movementX||0; _mouseDY += e.movementY||0; }, _sig);
    const c3d = document.getElementById('canvas-3d');
    c3d.addEventListener('mousemove', e => { _mouseDX += e.movementX||0; _mouseDY += e.movementY||0; }, _sig);
    canvasOut.addEventListener('touchmove', e => { if (e.target === canvasOut) { const r = canvasOut.getBoundingClientRect(); const t = e.touches[0]; _mouseX = t.clientX - r.left; _mouseY = t.clientY - r.top; e.preventDefault(); } }, {passive:false, signal: window._runAbort.signal});

    // Click detection — single click/tap event, coordinates captured at click time
    const outputContent = canvasOut.parentElement;
    outputContent.addEventListener('click', e => {
      if (e.target.closest('.dpad')) return;
      const r = canvasOut.getBoundingClientRect();
      _pendingClickX = e.clientX - r.left;
      _pendingClickY = e.clientY - r.top;
      _pendingClick = 1;
    }, _sig);
    let _lastTouchX = 0, _lastTouchY = 0;
    outputContent.addEventListener('touchstart', e => {
      if (e.target.closest('.dpad')) return;
      const r = canvasOut.getBoundingClientRect();
      const t = e.touches[0];
      _lastTouchX = t.clientX - r.left;
      _lastTouchY = t.clientY - r.top;
      _mouseX = _lastTouchX;
      _mouseY = _lastTouchY;
    }, {passive:true, signal: window._runAbort.signal});
    outputContent.addEventListener('touchend', e => {
      if (e.target.closest('.dpad')) return;
      _pendingClickX = _lastTouchX;
      _pendingClickY = _lastTouchY;
      _pendingClick = 1;
      e.preventDefault();
    }, _sig);

    const _ctx = canvasOut.getContext('2d');
    // Reset canvas state between runs
    _ctx.globalAlpha = 1;
    _ctx.lineWidth = 1;
    _ctx.font = '16px monospace';
    _ctx.textBaseline = 'middle';

    // Register struct definitions from AST
    for (const node of ast.body) {
      if (node.type === 'Struct') {
        const sid = Object.keys(_structs).length;
        _structs[sid] = { fieldCount: node.fields.length };
      }
    }

    // 3D init helper — called by any td_* function if _td doesn't exist yet
    function _tdInit() {
      if (window._td) return;
      const c3d = document.getElementById('canvas-3d');
      const co = document.getElementById('canvas-out');
      const container = co.parentElement;
      const w = container.clientWidth || co.width || 800;
      const h = container.clientHeight || co.height || 600;
      c3d.width = w; c3d.height = h;
      c3d.style.display = 'block';
      co.style.display = 'none';
      const T = window.THREE;
      if (!T) { console.error('Three.js not loaded'); return; }
      const renderer = new T.WebGLRenderer({ canvas: c3d, antialias: true });
      renderer.setSize(w, h);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = T.PCFSoftShadowMap;
      const scene = new T.Scene();
      scene.background = new T.Color(0.6, 0.7, 0.8);
      const camera = new T.PerspectiveCamera(60, w / h, 0.1, 120);
      camera.position.set(0, 5, 10);
      camera.lookAt(0, 0, 0);
      const ambient = new T.AmbientLight(0x606060, 2.0);
      scene.add(ambient);
      const hemi = new T.HemisphereLight(0x8888cc, 0x444422, 1.0);
      scene.add(hemi);
      const dirLight = new T.DirectionalLight(0xffffff, 2.5);
      dirLight.position.set(5, 10, 7);
      dirLight.castShadow = true;
      dirLight.shadow.mapSize.width = 2048;
      dirLight.shadow.mapSize.height = 2048;
      dirLight.shadow.camera.near = 0.1;
      dirLight.shadow.camera.far = 150;
      dirLight.shadow.camera.left = -50;
      dirLight.shadow.camera.right = 50;
      dirLight.shadow.camera.top = 50;
