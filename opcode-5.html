          for(let i=0;i<400;i++){
            const t=Math.random()*Math.PI*2,p2=Math.acos(2*Math.random()-1),sr=r*5+Math.random()*r*3;
            sPos2[i*3]=sr*Math.sin(p2)*Math.cos(t);sPos2[i*3+1]=sr*Math.sin(p2)*Math.sin(t);sPos2[i*3+2]=sr*Math.cos(p2);
          }
          starGeo2.setAttribute('position',new T.BufferAttribute(sPos2,3));
          const starPts=new T.Points(starGeo2,new T.PointsMaterial({size:0.3,color:0xffffff}));
          td.scene.add(starPts);td.meshes.push(starPts);
          if(td.ambient)td.ambient.intensity=0.4;
          if(td.dirLight){td.dirLight.intensity=2.0;td.dirLight.position.set(r*3,r*2,r*3);}
        },
        // ── ppos3d: position the last created planet ──
        td_ppos: (x,y,z) => {
          if(!window._td||!window._td.lastPlanet) return;
          const p=window._td.lastPlanet;
          const dx=x-p.cx, dy=y-p.cy, dz=z-p.cz;
          p.cx=x; p.cy=y; p.cz=z;
          // Move all meshes belonging to this planet
          if(p.mesh){p.mesh.position.set(x,y,z);}
          if(p.oceanMesh){p.oceanMesh.position.set(x,y,z);}
          if(p.atmosMesh){p.atmosMesh.position.set(x,y,z);}
        },
        // ── grav3d: gravitational acceleration magnitude toward nearest planet ──
        td_grav: (x,y,z) => {
          if(!window._td||!window._td.planets||!window._td.planets.length) return 0;
          const planets=window._td.planets;
          let minDist=Infinity, nearest=null;
          for(const p of planets){
            const dx=x-p.cx,dy=y-p.cy,dz=z-p.cz;
            const d=Math.sqrt(dx*dx+dy*dy+dz*dz);
            if(d<minDist){minDist=d;nearest=p;}
          }
          if(!nearest) return 0;
          // Gravity strength: G proportional to planet radius, falls off with distance²
          // At surface, acceleration = 10 (earth-like feel)
          const surfaceG=10;
          const g=surfaceG*nearest.r*nearest.r/(minDist*minDist);
          return Math.min(g,100); // cap to prevent infinity
        },
        // ── Surface snap: project onto NEAREST planet surface + height ──
        td_surfx: (x,y,z) => {
          if(!window._td||!window._td.planets||!window._td.planets.length) return x;
          const planets=window._td.planets;
          let minDist=Infinity, nearest=null;
          for(const p of planets){
            const dx=x-p.cx,dy=y-p.cy,dz=z-p.cz;
            const d=Math.sqrt(dx*dx+dy*dy+dz*dz);
            if(d<minDist){minDist=d;nearest=p;}
          }
          if(!nearest) return x;
          const dx=x-nearest.cx,dy=y-nearest.cy,dz=z-nearest.cz;
          const dist=Math.sqrt(dx*dx+dy*dy+dz*dz)||0.001;
          const h=1.6;
          return nearest.cx+(dx/dist)*(nearest.r+h);
        },
        td_surfy: (x,y,z) => {
          if(!window._td||!window._td.planets||!window._td.planets.length) return y;
          const planets=window._td.planets;
          let minDist=Infinity, nearest=null;
          for(const p of planets){
            const dx=x-p.cx,dy=y-p.cy,dz=z-p.cz;
            const d=Math.sqrt(dx*dx+dy*dy+dz*dz);
            if(d<minDist){minDist=d;nearest=p;}
          }
          if(!nearest) return y;
          const dx=x-nearest.cx,dy=y-nearest.cy,dz=z-nearest.cz;
          const dist=Math.sqrt(dx*dx+dy*dy+dz*dz)||0.001;
          const h=1.6;
          return nearest.cy+(dy/dist)*(nearest.r+h);
        },
        td_surfz: (x,y,z) => {
          if(!window._td||!window._td.planets||!window._td.planets.length) return z;
          const planets=window._td.planets;
          let minDist=Infinity, nearest=null;
          for(const p of planets){
            const dx=x-p.cx,dy=y-p.cy,dz=z-p.cz;
            const d=Math.sqrt(dx*dx+dy*dy+dz*dz);
            if(d<minDist){minDist=d;nearest=p;}
          }
          if(!nearest) return z;
          const dx=x-nearest.cx,dy=y-nearest.cy,dz=z-nearest.cz;
          const dist=Math.sqrt(dx*dx+dy*dy+dz*dz)||0.001;
          const h=1.6;
          return nearest.cz+(dz/dist)*(nearest.r+h);
        },
        // ── Up vector: direction from NEAREST planet center ──
        td_upx: (x,y,z) => {
          if(!window._td||!window._td.planets||!window._td.planets.length) return 0;
          const planets=window._td.planets;
          let minDist=Infinity, nearest=null;
          for(const p of planets){const dx=x-p.cx,dy=y-p.cy,dz=z-p.cz,d=Math.sqrt(dx*dx+dy*dy+dz*dz);if(d<minDist){minDist=d;nearest=p;}}
          if(!nearest) return 0;
          return (x-nearest.cx)/(minDist||0.001);
        },
        td_upy: (x,y,z) => {
          if(!window._td||!window._td.planets||!window._td.planets.length) return 1;
          const planets=window._td.planets;
          let minDist=Infinity, nearest=null;
          for(const p of planets){const dx=x-p.cx,dy=y-p.cy,dz=z-p.cz,d=Math.sqrt(dx*dx+dy*dy+dz*dz);if(d<minDist){minDist=d;nearest=p;}}
          if(!nearest) return 1;
          return (y-nearest.cy)/(minDist||0.001);
        },
        td_upz: (x,y,z) => {
          if(!window._td||!window._td.planets||!window._td.planets.length) return 0;
          const planets=window._td.planets;
          let minDist=Infinity, nearest=null;
          for(const p of planets){const dx=x-p.cx,dy=y-p.cy,dz=z-p.cz,d=Math.sqrt(dx*dx+dy*dy+dz*dz);if(d<minDist){minDist=d;nearest=p;}}
          if(!nearest) return 0;
          return (z-nearest.cz)/(minDist||0.001);
        },
        // Memory
        memory: wasmMemory,
      }
    };

    // Parse AST to get struct info (already done above)
    const ast_ref = ast; // keep reference for struct registration

    const { instance } = await WebAssembly.instantiate(wasmBuffer, importObject);
    wasmInstance = instance;

    statusText.textContent = 'running';
    statusDot.style.background = 'var(--green)';
    running = true;
    editor.blur(); // Release focus so keyboard events go to document
    // Mobile: fullscreen canvas when running
    if (window.innerWidth <= 800) {
      document.getElementById('app').classList.add('mobile-running');
      resizeCanvas();
      setTimeout(resizeCanvas, 100);
      setTimeout(resizeCanvas, 300);
    }
    // Show mobile d-pad for init+tick programs
    const _dpad = document.getElementById('dpad');

    // Detect program type by exports
    const exp = instance.exports;

    if (exp.init && exp.tick) {
      // Cache particle count/stride from source for renderer
      const countMatch = src.match(/let\s+COUNT\s*=\s*(\d+)/);
      const nMatch = src.match(/let\s+N\s*=\s*(\d+)/);
      renderParticles._count = countMatch ? parseInt(countMatch[1]) : (nMatch ? parseInt(nMatch[1]) : 1000);
      const strideMatch = src.match(/let\s+STRIDE\s*=\s*(\d+)/);
      renderParticles._stride = strideMatch ? parseInt(strideMatch[1]) : 8;
      // Animation loop (particles, nbody)
      exp.init();
      runAnimLoop(exp);
    } else if (exp.render) {
      // Single-frame render (mandelbrot)
      // Cache WIDTH/HEIGHT from source for blitPixels
      const wMatch = src.match(/let\s+WIDTH\s*=\s*(\d+)/);
      const hMatch = src.match(/let\s+HEIGHT\s*=\s*(\d+)/);
      blitPixels._w = wMatch ? parseInt(wMatch[1]) : canvasOut.width;
      blitPixels._h = hMatch ? parseInt(hMatch[1]) : canvasOut.height;
      const rt0 = performance.now();
      exp.render();
      const renderTime = (performance.now() - rt0).toFixed(1);
      log_console(`Rendered in ${renderTime}ms`);
      blitPixels();
      statusText.textContent = `done (${renderTime}ms)`;
    } else if (exp.main) {
      // Switch to console tab for text-output programs
      document.querySelectorAll('.output-tabs button').forEach(b => b.classList.remove('active'));
      document.querySelector('[data-tab="console"]').classList.add('active');
      canvasOut.style.display = 'none';
      consoleOut.style.display = 'block';
      wasmOut.style.display = 'none';
      helpOut.style.display = 'none';
      exp.main();
      statusText.textContent = 'done';
    } else {
      log_console('[WARN] No exported entry point (export init+tick, render, or main)');
    }
  } catch (err) {
    compileInfo.innerHTML = `<span class="err">✗ WASM error: ${err.message}</span>`;
    statusText.textContent = 'runtime error';
    statusDot.style.background = 'var(--red)';
    log_console(`[WASM ERROR] ${err.message}`);
    console.error(err);
  }
}

function runAnimLoop(exp) {
  const canvas = canvasOut;
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;
  let lastTime = performance.now();
  let frameCount = 0;
  let fpsTimer = 0;

  // Detect: is this using pixel (mandelbrot) or store (particles)?
  // Detect rendering mode
  const usesPixel = editor.value.includes('pixel ');
  const usesDraw = /\b(clear|fill|rect|circle|line)\b/.test(editor.value);
  const usesStore = /\bstore\b/.test(editor.value);

  function frame() {
    if (!running) return;

    const now = performance.now();
    const dt = now - lastTime;
    lastTime = now;
    _deltaTime = dt / 1000; // seconds
    frameCount++;
    fpsTimer += dt;
    if (fpsTimer >= 1000) {
      fpsDisplay.textContent = `${frameCount} fps`;
      frameCount = 0;
      fpsTimer = 0;
    }

    // Transfer pending click to active
    if (_pendingClick) {
      _clicked = 1;
      _clickX = _pendingClickX;
      _clickY = _pendingClickY;
      _pendingClick = 0;
    } else {
      _clicked = 0;
    }

    exp.tick();

    if (usesPixel) {
      blitPixels();
    } else if (usesDraw) {
      // Drawing commands handle their own rendering — nothing to do
    } else if (usesStore) {
      renderParticles(ctx, W, H);
    }

    animId = requestAnimationFrame(frame);
  }

  animId = requestAnimationFrame(frame);
}

function blitPixels() {
  const ctx = canvasOut.getContext('2d');
  const W = blitPixels._w || canvasOut.width;
  const H = blitPixels._h || canvasOut.height;
  const mem = new Float64Array(wasmMemory.buffer);
  const pixelOffset = 1048576 / 8; // pixel[] starts at 1MB, each f64 is 8 bytes
  const imgData = ctx.createImageData(W, H);
  const d = imgData.data;
  const total = W * H * 4;

  for (let i = 0; i < total; i++) {
    d[i] = mem[pixelOffset + i] | 0;
  }
  ctx.putImageData(imgData, 0, 0);
}

function renderParticles(ctx, W, H) {
  const mem = new Float64Array(wasmMemory.buffer);
  ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
  ctx.fillRect(0, 0, W, H);

  const count = renderParticles._count || 1000;
  const stride = renderParticles._stride || 8;

  for (let i = 0; i < count; i++) {
    const base = i * stride;
    const x = mem[base];
    const y = mem[base + 1];

    if (stride >= 8) {
      const life = mem[base + 4];
      const r = mem[base + 5];
      const g = mem[base + 6];
      const b = mem[base + 7];
      const alpha = Math.min(1, life / 80);
      ctx.fillStyle = `rgba(${(r * 255)|0}, ${(g * 255)|0}, ${(b * 255)|0}, ${alpha})`;
      ctx.fillRect(x, y, 2, 2);
    } else {
      const mass = stride >= 5 ? mem[base + 4] : 1;
      const size = Math.max(1, mass * 1.5);
      ctx.fillStyle = `rgba(255, ${(150 + mass * 30)|0}, ${(80)|0}, 0.9)`;
      ctx.beginPath();
      ctx.arc(x, y, size, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function stop_running() {
  running = false;
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  if (window._runAbort) { window._runAbort.abort(); window._runAbort = null; }
  if (window._opMusic) { window._opMusic.stop = true; window._opMusic = null; }
  // Clean up 3D scene
  if (window._td) {
    if (window._td._flashDiv && window._td._flashDiv.parentNode) window._td._flashDiv.parentNode.removeChild(window._td._flashDiv);
    for (const m of window._td.meshes) window._td.scene.remove(m);
    window._td.renderer.dispose();
    window._td = null;
    document.getElementById('canvas-3d').style.display = 'none';
    document.getElementById('canvas-out').style.display = 'block';
  }
  wasmInstance = null;
  statusText.textContent = 'stopped';
  statusDot.style.background = 'var(--text2)';
  fpsDisplay.textContent = '';
  // Remove any input elements
  document.querySelectorAll('.opcode-input').forEach(el => el.remove());
  document.getElementById('dpad').classList.remove('active');
  document.getElementById('dpad').classList.remove('show-fire2');
  // Mobile: restore editor
  document.getElementById('app').classList.remove('mobile-running');
  document.getElementById('app').classList.remove('mobile-output');
  const _tbtn = document.getElementById('btn-toggle');
  if (_tbtn) _tbtn.textContent = 'VIEW';
  setTimeout(resizeCanvas, 50);
}

// ── Mobile D-Pad ──
(function() {
  const dpad = document.getElementById('dpad');
  const keyMap = { 'dp-up': 38, 'dp-down': 40, 'dp-left': 37, 'dp-right': 39, 'dp-fire': 32, 'dp-fire2': 83 };
  for (const cls in keyMap) {
    const btn = dpad.querySelector('.' + cls);
    if (!btn) continue;
    const code = keyMap[cls];
    btn.addEventListener('touchstart', e => { e.preventDefault(); _keys[code] = true; _lastKey = code; }, {passive:false});
    btn.addEventListener('touchend', e => { e.preventDefault(); _keys[code] = false; }, {passive:false});
    btn.addEventListener('mousedown', e => { e.preventDefault(); _keys[code] = true; _lastKey = code; });
    btn.addEventListener('mouseup', e => { e.preventDefault(); _keys[code] = false; });
  }
})();

// Size canvas to fit container
function resizeCanvas() {
  const container = canvasOut.parentElement;
  const w = container.clientWidth || window.innerWidth;
  const h = container.clientHeight || window.innerHeight;
  if (w > 0 && h > 0) {
    canvasOut.width = w;
    canvasOut.height = h;
  }
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
// Also observe container size changes
if (typeof ResizeObserver !== 'undefined') {
  new ResizeObserver(resizeCanvas).observe(canvasOut.parentElement);
}

editor.value = localStorage.getItem('opcode_last') || EXAMPLES.particle_sim;
lastUndoValue = editor.value;
updateLineNums();
highlightCode();

// Auto-save on every edit
editor.addEventListener('input', () => { localStorage.setItem('opcode_last', editor.value); });

// ── Splash Screen ──
(function splash() {
  // Switch to canvas tab
  document.querySelectorAll('.output-tabs button').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-tab="canvas"]').classList.add('active');
  canvasOut.style.display = 'block';
  consoleOut.style.display = 'none';
  wasmOut.style.display = 'none';
  helpOut.style.display = 'none';

  const ctx = canvasOut.getContext('2d');
  const PI = Math.PI;
  let frame = 0;
  let done = false;

  function draw() {
    if (done) return;
    const W = canvasOut.width, H = canvasOut.height;
    const cx = W / 2, cy = H / 2;
    const R = Math.min(W, H) * 0.25;

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    frame++;
    const t = frame / 60; // seconds
    const angle = t * 0.8;

    // Phase 1 (0-2s): rotate  Phase 2 (2-3.5s): converge + type  Phase 3 (4.5+): hold
    let lonTilt = 1, latTilt = 1;
    if (t > 2 && t <= 3.5) { const p = (t - 2) / 1.5; lonTilt = 1 - p; latTilt = 1 - p; }
    else if (t > 3.5) { lonTilt = 0; latTilt = 0; }

    // Longitude ellipses (blue) — hide when fully flat
    if (lonTilt > 0.01) {
      for (let i = 0; i < 8; i++) {
        const lon = i * PI / 8 + angle;
        const sq = Math.cos(lon) * lonTilt, s = Math.sin(lon);
        if (s > 0.05) {
          const b = Math.floor(80 + s * 175);
          ctx.strokeStyle = `rgb(30,${b},255)`; ctx.lineWidth = 1.5; ctx.beginPath();
          for (let j = 0; j <= 40; j++) {
            const th = j * 2 * PI / 40;
            const px = cx + sq * Math.sin(th) * R, py = cy - Math.cos(th) * R;
            j === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
          }
          ctx.stroke();
        }
      }
    }

    // Latitude ellipses (red) — hide when fully flat
    if (latTilt > 0.01) {
      for (let i = 0; i < 8; i++) {
        const lat = i * PI / 8 + angle;
        const sq = Math.cos(lat) * latTilt, s = Math.sin(lat);
        if (s > 0.05) {
          const b = Math.floor(80 + s * 175);
          ctx.strokeStyle = `rgb(255,30,${b})`; ctx.lineWidth = 1.5; ctx.beginPath();
          for (let j = 0; j <= 40; j++) {
            const th = j * 2 * PI / 40;
            const px = cx + Math.cos(th) * R, py = cy - sq * Math.sin(th) * R;
            j === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
          }
          ctx.stroke();
        }
      }
    }

    // Orange circle fades in during convergence
    if (t > 2.5) {
      ctx.strokeStyle = `rgba(255,107,43,${Math.min(1, (t - 2.5) / 1)})`;
      ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(cx, cy, R, 0, PI * 2); ctx.stroke();
    }

    // "Opcode" types during convergence
    if (t > 2.8) {
      const text = 'Opcode';
      const n = Math.min(text.length, Math.floor((t - 2.8) * 5));
      const shown = text.substring(0, n);
      ctx.font = `bold ${Math.floor(R * 0.4)}px 'Space Grotesk', sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#ff6b2b';
      ctx.fillText(shown, cx, cy);
      if (n < text.length && Math.floor(t * 3) % 2 === 0) {
        const m = ctx.measureText(shown);
        ctx.fillRect(cx + m.width / 2 + 2, cy - R * 0.15, 2, R * 0.3);
      }
    }

    // Subtitle
    if (t > 4.2) {
      ctx.font = `300 ${Math.floor(R * 0.12)}px 'Space Grotesk', sans-serif`;
      ctx.fillStyle = `rgba(200,200,224,${Math.min(1, (t - 4.2) / 0.8)})`;
      ctx.textAlign = 'center';
      ctx.fillText('WASM language', cx, cy + R * 0.35);
    }

    if (t > 6) { dismiss(); return; }

    requestAnimationFrame(draw);
  }

  function dismiss() {
    if (done) return;
    done = true;
    // Clear canvas
    const ctx2 = canvasOut.getContext('2d');
    ctx2.clearRect(0, 0, canvasOut.width, canvasOut.height);
  }

  // Click/tap to skip
  const skipHandler = () => { dismiss(); canvasOut.removeEventListener('click', skipHandler); };
  canvasOut.addEventListener('click', skipHandler);

  draw();
})();
