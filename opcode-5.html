// ── Undo/Redo system ──
const undoStack = [];
const redoStack = [];
let undoTimer = null;
let lastUndoValue = '';

function pushUndo() {
  const val = editor.value;
  if (val === lastUndoValue) return;
  undoStack.push({ text: lastUndoValue, sel: editor.selectionStart });
  if (undoStack.length > 200) undoStack.shift();
  redoStack.length = 0;
  lastUndoValue = val;
}

function scheduleUndo() {
  if (undoTimer) clearTimeout(undoTimer);
  undoTimer = setTimeout(pushUndo, 300);
}

function doUndo() {
  pushUndo(); // flush pending
  if (undoStack.length === 0) return;
  const entry = undoStack.pop();
  redoStack.push({ text: editor.value, sel: editor.selectionStart });
  editor.value = entry.text;
  editor.selectionStart = editor.selectionEnd = entry.sel;
  lastUndoValue = editor.value;
  refresh();
}

function doRedo() {
  if (redoStack.length === 0) return;
  const entry = redoStack.pop();
  undoStack.push({ text: editor.value, sel: editor.selectionStart });
  editor.value = entry.text;
  editor.selectionStart = editor.selectionEnd = entry.sel;
  lastUndoValue = editor.value;
  refresh();
}

// ── Error line tracking ──
let errorLine = -1;

function clearError() {
  if (errorLine >= 0) { errorLine = -1; updateLineNums(); highlightCode(); }
}

function setErrorLine(lineNum) {
  errorLine = lineNum;
  updateLineNums();
  highlightCode();
}

// Refresh all editor visuals
function refresh() {
  updateLineNums();
  highlightCode();
  syncScroll();
  updateCursorPos();
  mmUpdate();
}

// ── Minimap ──
const mmCanvas = document.getElementById('mm-canvas');
const mmViewport = document.getElementById('mm-viewport');
const mmCtx = mmCanvas.getContext('2d');
const mmWrap = document.getElementById('minimap');
const MM_KW = OPCODE_KW;
const MM_COLORS = { kw: '#5cb8ff', op: '#6fffb0', num: '#d9a0ff', cmt: '#4a4a6a', str: '#ffe066', def: '#555570' };
let mmLineH = 1; // cached for viewport calc
let mmLineCount = 0;

// Cheap: only move the orange viewport box (called on scroll)
function mmUpdateViewport() {
  const h = mmWrap.clientHeight;
  if (!h || !mmLineCount) return;
  const totalH = mmLineCount * mmLineH;
  const ratio = h / (editor.scrollHeight || 1);
  const vpTop = (editor.scrollTop / (editor.scrollHeight || 1)) * totalH;
  const vpH = Math.max(10, ratio * totalH);
  mmViewport.style.top = Math.min(vpTop, h - vpH) + 'px';
  mmViewport.style.height = vpH + 'px';
}

// Full: redraw canvas + update viewport (called on content change)
function mmUpdate() {
  const src = editor.value;
  const lines = src.split('\n');
  const h = mmWrap.clientHeight;
  if (!h) return;
  mmLineCount = lines.length;
  mmLineH = Math.max(1, Math.min(2, h / lines.length));
  const canvasH = Math.max(h, Math.ceil(lines.length * mmLineH));
  mmCanvas.width = 60;
  mmCanvas.height = canvasH;
  mmCtx.fillStyle = 'rgba(6,6,16,0.85)';
  mmCtx.fillRect(0, 0, 60, canvasH);

  for (let li = 0; li < lines.length; li++) {
    const line = lines[li];
    const trimmed = line.trim();
    const y = Math.floor(li * mmLineH);
    const indent = line.length - line.trimStart().length;
    const x0 = Math.min(indent * 0.8, 15);

    if (trimmed.startsWith('//')) {
      mmCtx.fillStyle = MM_COLORS.cmt;
      mmCtx.fillRect(x0, y, Math.min(trimmed.length * 0.5, 45), mmLineH);
      continue;
    }

    // Simple token coloring
    let x = x0;
    const words = trimmed.split(/(\s+)/);
    for (const w of words) {
      const pw = Math.min(w.length * 0.6, 20);
      if (w.trim().length === 0) { x += pw * 0.3; continue; }
      if (MM_KW.has(w)) mmCtx.fillStyle = MM_COLORS.kw;
      else if (/^\d/.test(w)) mmCtx.fillStyle = MM_COLORS.num;
      else if (w.startsWith('"')) mmCtx.fillStyle = MM_COLORS.str;
      else mmCtx.fillStyle = MM_COLORS.def;
      mmCtx.fillRect(x, y, pw, mmLineH);
      x += pw + 0.5;
      if (x > 55) break;
    }
  }

  mmUpdateViewport();
}

// Scroll minimap to click/drag position
function mmScrollTo(clientY) {
  const rect = mmCanvas.getBoundingClientRect();
  const clickY = Math.max(0, Math.min(clientY - rect.top, rect.height));
  const ratio = clickY / rect.height;
  editor.scrollTop = ratio * editor.scrollHeight;
  syncScroll();
  mmUpdateViewport();
}

// Click minimap to jump
let mmDragging = false;
mmWrap.addEventListener('mousedown', e => {
  e.preventDefault();
  mmDragging = true;
  mmViewport.style.transition = 'none'; // instant during drag
  mmScrollTo(e.clientY);
});
document.addEventListener('mousemove', e => {
  if (!mmDragging) return;
  e.preventDefault();
  mmScrollTo(e.clientY);
});
document.addEventListener('mouseup', () => {
  if (mmDragging) {
    mmDragging = false;
    mmViewport.style.transition = 'top 0.06s ease-out, height 0.06s ease-out';
  }
});

// Touch drag on minimap
mmWrap.addEventListener('touchstart', e => {
  mmDragging = true;
  mmViewport.style.transition = 'none';
  mmScrollTo(e.touches[0].clientY);
}, {passive: true});
mmWrap.addEventListener('touchmove', e => {
  if (mmDragging) mmScrollTo(e.touches[0].clientY);
}, {passive: true});
mmWrap.addEventListener('touchend', () => {
  mmDragging = false;
  mmViewport.style.transition = 'top 0.06s ease-out, height 0.06s ease-out';
});

// Throttled scroll handler — only update viewport position, skip canvas redraw
let mmScrollRAF = 0;
editor.addEventListener('scroll', () => {
  syncScroll();
  if (!mmScrollRAF) {
    mmScrollRAF = requestAnimationFrame(() => {
      mmUpdateViewport();
      mmScrollRAF = 0;
    });

// All completable words with categories

function acCollectUserWords() {
  // Scan editor text for user-defined identifiers
  const src = editor.value;
  const userWords = new Set();
  const kwSet = new Set(AC_KEYWORDS.map(k => k.w));
  const re = /\b([a-zA-Z_]\w*)\b/g;
  let m;
  while ((m = re.exec(src)) !== null) {
    if (!kwSet.has(m[1]) && m[1].length > 1) userWords.add(m[1]);
  }
  return Array.from(userWords).map(w => ({w, k:'user'}));
}

function acGetWordAtCursor() {
  const pos = editor.selectionStart;
  const text = editor.value;
  let start = pos;
  while (start > 0 && /[a-zA-Z_0-9]/.test(text[start - 1])) start--;
  // Don't trigger on numbers
  if (start < pos && text[start] >= '0' && text[start] <= '9') return { word: '', start: pos };
  return { word: text.substring(start, pos), start };
}

function acUpdate() {
  const { word, start } = acGetWordAtCursor();
  if (word.length < 2) { acHide(); return; }

  const prefix = word.toLowerCase();
  const all = AC_KEYWORDS.concat(acCollectUserWords());
  // Filter: starts with prefix, not exact match
  const matches = [];
  const seen = new Set();
  for (const item of all) {
    const lw = item.w.toLowerCase();
    if (lw.startsWith(prefix) && lw !== prefix && !seen.has(item.w)) {
      seen.add(item.w);
      matches.push(item);
    }
  }
  if (matches.length === 0) { acHide(); return; }

  acItems = matches.slice(0, 8);
  acPrefix = word;
  acStart = start;
  acIdx = 0;
  acRender();
  acPosition();
  acPopup.style.display = 'block';
}

function acRender() {
  acPopup.innerHTML = acItems.map((item, i) =>
    `<div class="ac-item${i === acIdx ? ' sel' : ''}" data-idx="${i}"><span>${escHtml(item.w)}</span><span class="ac-kind">${item.k}</span></div>`
  ).join('');
  // Click handler
  acPopup.querySelectorAll('.ac-item').forEach(el => {
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      acAccept(parseInt(el.dataset.idx));
    });
  });
}

function acPosition() {
  // Estimate cursor position in the textarea
  const text = editor.value.substring(0, editor.selectionStart);
  const lines = text.split('\n');
  const lineIdx = lines.length - 1;
  const colIdx = lines[lineIdx].length;

  const cs = getComputedStyle(editor);
  const lineHeight = parseFloat(cs.lineHeight) || (parseFloat(cs.fontSize) * 1.6);
  const charWidth = 7.8; // approximate monospace char width at 13px
  const padTop = parseFloat(cs.paddingTop) || 0;
  const padLeft = parseFloat(cs.paddingLeft) || 56;

  const top = padTop + lineIdx * lineHeight - editor.scrollTop + lineHeight + 2;
  const left = padLeft + colIdx * charWidth - editor.scrollLeft;

  acPopup.style.top = Math.max(0, Math.min(top, editor.clientHeight - 60)) + 'px';
  acPopup.style.left = Math.max(padLeft, Math.min(left, editor.clientWidth - 150)) + 'px';
}

function acAccept(idx) {
  if (idx === undefined) idx = acIdx;
  const item = acItems[idx];
  if (!item) return;
  pushUndo();
  const before = editor.value.substring(0, acStart);
  const after = editor.value.substring(editor.selectionStart);
  editor.value = before + item.w + after;
  const newPos = acStart + item.w.length;
  editor.selectionStart = editor.selectionEnd = newPos;
  lastUndoValue = editor.value;
  acHide();
  refresh();
}

function acHide() {
  acPopup.style.display = 'none';
  acItems = [];
}

function acVisible() {
  return acPopup.style.display === 'block' && acItems.length > 0;
}

// ── Keyboard handler — Autocomplete, Tab, Enter (auto-indent), Undo/Redo, Ctrl+Enter ──
editor.addEventListener('keydown', e => {
  // Autocomplete navigation
  if (acVisible()) {
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      acIdx = (acIdx + 1) % acItems.length;
      acRender();
      return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      acIdx = (acIdx - 1 + acItems.length) % acItems.length;
      acRender();
      return;
    }
    if (e.key === 'Enter' || e.key === 'Tab') {
      e.preventDefault();
      acAccept();
      return;
    }
    if (e.key === 'Escape') {
      e.preventDefault();
      acHide();
      return;
    }
  }

  // Undo: Ctrl+Z
  if (e.key === 'z' && (e.ctrlKey || e.metaKey) && !e.shiftKey) {
    e.preventDefault();
    doUndo();
    return;
  }
  // Redo: Ctrl+Shift+Z or Ctrl+Y
  if ((e.key === 'z' && (e.ctrlKey || e.metaKey) && e.shiftKey) ||
      (e.key === 'y' && (e.ctrlKey || e.metaKey))) {
    e.preventDefault();
    doRedo();
    return;
  }
  // Run: Ctrl+Enter
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    compile_and_run();
    return;
  }
  // Tab: insert 2 spaces
  if (e.key === 'Tab') {
    e.preventDefault();
    pushUndo();
    const s = editor.selectionStart;
    editor.value = editor.value.substring(0, s) + '  ' + editor.value.substring(editor.selectionEnd);
    editor.selectionStart = editor.selectionEnd = s + 2;
    lastUndoValue = editor.value;
    clearError();
    refresh();
    return;
  }
  // Enter: auto-indent
  if (e.key === 'Enter' && !e.ctrlKey && !e.metaKey) {
    e.preventDefault();
    pushUndo();
    const s = editor.selectionStart;
    const before = editor.value.substring(0, s);
    const after = editor.value.substring(editor.selectionEnd);
    // Get current line
    const lineStart = before.lastIndexOf('\n') + 1;
    const currentLine = before.substring(lineStart);
    // Match existing indent
    const indentMatch = currentLine.match(/^(\s*)/);
    let indent = indentMatch ? indentMatch[1] : '';
    // If line ends with comma (block open), add 2 more spaces
    const trimmed = currentLine.trimEnd();
    if (trimmed.endsWith(',')) {
      indent += '  ';
    }
    // If typing a closing dot on an indented line, de-indent
    editor.value = before + '\n' + indent + after;
    const newPos = s + 1 + indent.length;
    editor.selectionStart = editor.selectionEnd = newPos;
    lastUndoValue = editor.value;
    clearError();
    refresh();
    return;
  }
});
editor.addEventListener('blur', () => { setTimeout(acHide, 150); });

function updateLineNums() {
  const lines = editor.value.split('\n');
  
  // Calculate loop depth per line
  const loopDepth = new Uint8Array(lines.length);
  const blockStack = [];
  for (let i = 0; i < lines.length; i++) {
    const trimmed = lines[i].trim();
    
    if (trimmed === '.' || trimmed.startsWith('. ')) {
      if (blockStack.length > 0) blockStack.pop();
    }
    
    const depth = blockStack.filter(b => b === 'loop').length;
    if (depth > 0) loopDepth[i] = depth;
    
    if (trimmed.endsWith(',')) {
      if (/\b(loop|for|while)\b/.test(trimmed)) {
        loopDepth[i] = depth + 1;
        blockStack.push('loop');
      } else {
        blockStack.push('other');
      }
    }
  }
  
  let html = '';
  for (let i = 0; i < lines.length; i++) {
    const d = loopDepth[i];
    let cls = d ? `ln loop loop-${Math.min(d, 4)}` : 'ln';
    if (errorLine === i + 1) cls = 'ln err-line';
    html += `<span class="${cls}">${i + 1}</span>`;
  }
  lineNums.innerHTML = html;
}

function updateCursorPos() {
  const pos = editor.selectionStart;
  const text = editor.value.substring(0, pos);
  const line = text.split('\n').length;
  const col = pos - text.lastIndexOf('\n');
  cursorPos.textContent = `${line}:${col}`;
}

<div class="kw-row"><span class="kw-name">switch expr, case v, ... . .</span><span class="kw-desc">Multi-way branch. Match value against cases, with optional <code>else</code> default</span></div>

<h2>Operators</h2>
<div class="kw-row"><span class="kw-name">+ - * / %</span><span class="kw-desc">Arithmetic (<code>%</code> is mathematical modulo, always positive)</span></div>
<div class="kw-row"><span class="kw-name">== != &lt; &gt; &lt;= &gt;=</span><span class="kw-desc">Comparison (returns 1.0 or 0.0)</span></div>
<div class="kw-row"><span class="kw-name">and or not</span><span class="kw-desc">Logical operators (also <code>&amp;&amp; || !</code>)</span></div>

<h2>Bitwise Operators</h2>
<div class="section-intro">All bitwise ops truncate to i32, apply the WASM opcode, then convert back to f64.</div>
<div class="kw-row"><span class="kw-name">band a b</span><span class="kw-desc">Bitwise AND</span></div>
<div class="kw-row"><span class="kw-name">bor a b</span><span class="kw-desc">Bitwise OR</span></div>
<div class="kw-row"><span class="kw-name">bxor a b</span><span class="kw-desc">Bitwise XOR</span></div>
<div class="kw-row"><span class="kw-name">bshl a b</span><span class="kw-desc">Bitwise shift left — <code>bshl 1 4</code> = 16</span></div>

<h2>Math Builtins</h2>
<div class="section-intro">Math builtins grab tight args: <code>sin x * R</code> = <code>(sin x) * R</code>. Use parens for <code>sin (x * R)</code>.</div>
<div class="kw-row"><span class="kw-name">rand</span><span class="kw-desc">Random float 0..1 (no args)</span></div>
<div class="kw-row"><span class="kw-name">randi min max</span><span class="kw-desc">Random integer in range [min, max] inclusive</span></div>
<div class="kw-row"><span class="kw-name">sqrt x</span><span class="kw-desc">Square root</span></div>
<div class="kw-row"><span class="kw-name">sin x &nbsp; cos x &nbsp; tan x</span><span class="kw-desc">Trigonometric functions (radians)</span></div>
<div class="kw-row"><span class="kw-name">atan2 y x</span><span class="kw-desc">Two-argument arctangent — angle from x-axis (radians)</span></div>
<div class="kw-row"><span class="kw-name">log x</span><span class="kw-desc">Natural logarithm</span></div>
<div class="kw-row"><span class="kw-name">floor x &nbsp; ceil x</span><span class="kw-desc">Round down / up</span></div>
<div class="kw-row"><span class="kw-name">abs x</span><span class="kw-desc">Absolute value</span></div>
<div class="kw-row"><span class="kw-name">round x</span><span class="kw-desc">Round to nearest integer</span></div>
<div class="kw-row"><span class="kw-name">min a b &nbsp; max a b</span><span class="kw-desc">Minimum / maximum of two values (native WASM opcodes — zero overhead)</span></div>
<div class="kw-row"><span class="kw-name">pow base exp</span><span class="kw-desc">Raise base to the power of exp</span></div>

<h2>Memory (raw)</h2>
<div class="kw-row"><span class="kw-name">store idx = val</span><span class="kw-desc">Write f64 to WASM linear memory at index</span></div>
<div class="kw-row"><span class="kw-name">load idx</span><span class="kw-desc">Read f64 from WASM linear memory at index</span></div>
<div class="kw-row"><span class="kw-name">pixel idx = val</span><span class="kw-desc">Write to pixel framebuffer (for <code>render</code> exports)</span></div>

<h2>Arrays</h2>
<div class="kw-row"><span class="kw-name">array name size</span><span class="kw-desc">Declare an array of given size. Can be top-level or inside a function</span></div>
<div class="kw-row"><span class="kw-name">set name idx = val</span><span class="kw-desc">Set array element</span></div>
<div class="kw-row"><span class="kw-name">get name idx</span><span class="kw-desc">Get array element (returns value)</span></div>
<div class="kw-row"><span class="kw-name">len name</span><span class="kw-desc">Get array length</span></div>
<div class="kw-row"><span class="kw-name">data name v v v ...</span><span class="kw-desc">Bulk-load values into array (auto-incrementing offset)</span></div>
<div class="kw-row"><span class="kw-name">data name "hello"</span><span class="kw-desc">Load string as ASCII codes + null terminator into array</span></div>
<div class="kw-row"><span class="kw-name">push name val</span><span class="kw-desc">Append a value to the end of the array (grows automatically)</span></div>
<div class="kw-row"><span class="kw-name">pop name</span><span class="kw-desc">Remove and return the last element of the array</span></div>

<h2>Structs</h2>
<div class="kw-row"><span class="kw-name">struct name f1 f2 ...</span><span class="kw-desc">Define a struct type with named fields</span></div>
<div class="kw-row"><span class="kw-name">let p = new name</span><span class="kw-desc">Create a new instance (returns pointer)</span></div>
<div class="kw-row"><span class="kw-name">let p = new name a b c</span><span class="kw-desc">Create + initialize fields inline</span></div>
<div class="kw-row"><span class="kw-name">put p field = val</span><span class="kw-desc">Set a struct field</span></div>
<div class="kw-row"><span class="kw-name">put p field += val</span><span class="kw-desc">Compound assign to a struct field (also <code>-= *= /=</code>)</span></div>
<div class="kw-row"><span class="kw-name">of p field</span><span class="kw-desc">Read a struct field (returns value)</span></div>
<div class="kw-row"><span class="kw-name">p.field</span><span class="kw-desc">Dot access — shorthand for <code>of p field</code></span></div>
<div class="kw-row"><span class="kw-name">p.field = val</span><span class="kw-desc">Dot assign — shorthand for <code>put p field = val</code></span></div>
<div class="kw-row"><span class="kw-name">p.field += val</span><span class="kw-desc">Dot compound assign (also <code>-= *= /=</code>)</span></div>

<h2>Drawing (canvas)</h2>
<div class="kw-row"><span class="kw-name">clear</span><span class="kw-desc">Clear the entire canvas</span></div>
<div class="kw-row"><span class="kw-name">fill r g b</span><span class="kw-desc">Set fill/stroke color (0–255 each)</span></div>
<div class="kw-row"><span class="kw-name">rgba r g b a</span><span class="kw-desc">Set fill/stroke color with alpha. r,g,b=0–255, a=0.0–1.0</span></div>

<div class="kw-row"><span class="kw-name">alpha a</span><span class="kw-desc">Set global opacity (0.0–1.0). Reset with <code>alpha 1</code></span></div>
<div class="kw-row"><span class="kw-name">stroke w</span><span class="kw-desc">Set line width in pixels (default 1)</span></div>
<div class="kw-row"><span class="kw-name">rect x y w h</span><span class="kw-desc">Draw filled rectangle</span></div>
<div class="kw-row"><span class="kw-name">circle x y r</span><span class="kw-desc">Draw filled circle</span></div>
<div class="kw-row"><span class="kw-name">tri x1 y1 x2 y2 x3 y3</span><span class="kw-desc">Draw filled triangle with three vertices</span></div>
<div class="kw-row"><span class="kw-name">oval x y rx ry</span><span class="kw-desc">Draw filled ellipse at center x,y with radii rx and ry</span></div>
<div class="kw-row"><span class="kw-name">arc x y r start end</span><span class="kw-desc">Draw filled pie slice. Angles in radians</span></div>
<div class="kw-row"><span class="kw-name">line x1 y1 x2 y2</span><span class="kw-desc">Draw a line (uses current stroke width)</span></div>
<div class="kw-row"><span class="kw-name">text x y c1 c2 ...</span><span class="kw-desc">Draw text from ASCII codes (65=A, 66=B, etc.)</span></div>
<div class="kw-row"><span class="kw-name">drawnum x y val</span><span class="kw-desc">Draw a number on canvas at x, y</span></div>
<div class="kw-row"><span class="kw-name">drawtext arrname x y</span><span class="kw-desc">Draw string from array of ASCII codes at x, y (0 = end of string)</span></div>
<div class="kw-row"><span class="kw-name">drawstr x y "text"</span><span class="kw-desc">Draw a string literal directly on canvas — no ASCII codes needed</span></div>
<div class="kw-row"><span class="kw-name">camera cx cy</span><span class="kw-desc">Set camera offset. All drawing shifts by -cx, -cy. Use <code>camera 0 0</code> to reset (e.g. for HUD)</span></div>

<h2>Sprites</h2>
<div class="section-intro">Define small images from inline RGBA data, draw them anywhere at any scale.</div>
<div class="kw-row"><span class="kw-name">sprite id w h vals...</span><span class="kw-desc">Define sprite #id of size w×h from RGBA values (4 per pixel, 0–255)</span></div>
<div class="kw-row"><span class="kw-name">spr id x y</span><span class="kw-desc">Draw sprite #id at position x,y</span></div>
<div class="kw-row"><span class="kw-name">spr id x y scale</span><span class="kw-desc">Draw sprite scaled — 2 = double size, 0.5 = half size</span></div>
<div class="kw-row"><span class="kw-name">frame id n</span><span class="kw-desc">Switch sprite #id to animation frame n (define multiple sprites with same base ID)</span></div>

<h2>Collision Helpers</h2>
<div class="section-intro">Built-in collision detection — returns 1 if hit, 0 if not. These are expressions (use in <code>if</code>).</div>
<div class="kw-row"><span class="kw-name">hitcirc x1 y1 r1 x2 y2 r2</span><span class="kw-desc">Circle vs circle — 1 if overlapping</span></div>
<div class="kw-row"><span class="kw-name">hitrect x1 y1 w1 h1 x2 y2 w2 h2</span><span class="kw-desc">Rectangle vs rectangle — 1 if overlapping (AABB)</span></div>
<div class="kw-row"><span class="kw-name">dist x1 y1 x2 y2</span><span class="kw-desc">Distance between two points (returns float)</span></div>
<div class="section-intro">Example: <code>if hitcirc px py 10 ex ey 15, score += 1 .</code></div>

<h2>String Helpers</h2>
<div class="section-intro">Strings are arrays of ASCII codes terminated by 0. Use <code>data name "hello"</code> to initialize.</div>
<div class="kw-row"><span class="kw-name">strcmp arr1 arr2</span><span class="kw-desc">Compare two string arrays — returns 1 if equal, 0 if not</span></div>
<div class="kw-row"><span class="kw-name">strlen arr</span><span class="kw-desc">Length of null-terminated string in array (stops at 0)</span></div>
<div class="kw-row"><span class="kw-name">substr src dest off len</span><span class="kw-desc">Copy <code>len</code> chars from <code>src</code> starting at <code>off</code> into <code>dest</code></span></div>

<h2>Audio</h2>
<div class="kw-row"><span class="kw-name">beep freq dur</span><span class="kw-desc">Play a sine wave beep. Freq in Hz, dur in ms. E.g. <code>beep 440 100</code></span></div>
<div class="kw-row"><span class="kw-name">tone freq dur type</span><span class="kw-desc">Play a tone. Type: 0=sine, 1=square, 2=sawtooth, 3=triangle</span></div>
<div class="kw-row"><span class="kw-name">play arrname tempo</span><span class="kw-desc">Play a looping melody from an array of frequencies. Tempo in BPM. 0 = rest. Stops on STOP or new <code>play</code></span></div>
<div class="section-intro">Music example: <code>array melody 8</code> then <code>data melody 262 294 330 349 392 440 494 523</code> then <code>play melody 120</code> (C major scale at 120 BPM)</div>

<h2>Input</h2>
<div class="kw-row"><span class="kw-name">key</span><span class="kw-desc">Last key pressed (keycode), consumed on read. 0 if none</span></div>
<div class="kw-row"><span class="kw-name">down code</span><span class="kw-desc">1 if key is currently held, else 0. Common: 37←  38↑  39→  40↓  32=space</span></div>
<div class="kw-row"><span class="kw-name">mousex &nbsp; mousey</span><span class="kw-desc">Current mouse/touch position on canvas</span></div>
<div class="kw-row"><span class="kw-name">click</span><span class="kw-desc">1 if clicked/tapped this frame, else 0</span></div>
<div class="kw-row"><span class="kw-name">press x y w h</span><span class="kw-desc">1 if click landed inside the rectangle, else 0</span></div>
<div class="kw-row"><span class="kw-name">width &nbsp; height</span><span class="kw-desc">Canvas dimensions in pixels</span></div>
<div class="kw-row"><span class="kw-name">dt</span><span class="kw-desc">Delta time — seconds since last frame (~0.016 at 60fps)</span></div>
<div class="kw-row"><span class="kw-name">time</span><span class="kw-desc">Elapsed seconds since program started. Use for animations: <code>sin time</code></span></div>
<div class="kw-row"><span class="kw-name">input id</span><span class="kw-desc">Create/read an HTML input box (returns numeric value)</span></div>
<div class="kw-row"><span class="kw-name">clearinput id</span><span class="kw-desc">Clear an input box's content</span></div>
<div class="kw-row"><span class="kw-name">showpad</span><span class="kw-desc">Show mobile d-pad + fire button (call in <code>init</code>). Fire = space (keycode 32). In 3D mode, adds a second button (▼) mapped to S (keycode 83) for pitch down</span></div>
<div class="kw-row"><span class="kw-name">lockmouse</span><span class="kw-desc">Enable pointer lock on click — hides cursor, enables mouse delta tracking for FPS-style look</span></div>
<div class="kw-row"><span class="kw-name">mdx</span><span class="kw-desc">Mouse delta X since last tick (pixels moved). Use with <code>lockmouse</code> for mouse look</span></div>
<div class="kw-row"><span class="kw-name">mdy</span><span class="kw-desc">Mouse delta Y since last tick. Positive = mouse moved down</span></div>
<div class="section-intro">Mouse look pattern: <code>heading += mdx * 0.003</code>, <code>pitch -= mdy * 0.003</code></div>

<h2>Print (console)</h2>
<div class="kw-row"><span class="kw-name">print 72</span><span class="kw-desc">Print ASCII character to console tab (72 = H). Does NOT draw on canvas</span></div>
<div class="kw-row"><span class="kw-name">print "hello"</span><span class="kw-desc">Print a string literal to console tab</span></div>
<div class="kw-row"><span class="kw-name">printnum 42.5</span><span class="kw-desc">Print a number to console tab</span></div>
<div class="kw-row"><span class="kw-name">println</span><span class="kw-desc">Print a newline to console tab</span></div>
<div class="section-intro">To draw text on the canvas, use <code>text</code>, <code>drawnum</code>, or <code>drawtext</code> instead.</div>

<h2>Export Patterns</h2>
<div class="kw-row"><span class="kw-name">export init + export tick</span><span class="kw-desc">Animation loop — <code>init</code> runs once, <code>tick</code> runs every frame (~60fps)</span></div>
<div class="kw-row"><span class="kw-name">export render</span><span class="kw-desc">Single-frame pixel blit (use <code>pixel</code> to write framebuffer)</span></div>
<div class="kw-row"><span class="kw-name">export main</span><span class="kw-desc">One-shot console program</span></div>

<h2>Tips</h2>
<div class="kw-row"><span class="kw-name">Ctrl+Enter</span><span class="kw-desc">Run the program</span></div>
<div class="kw-row"><span class="kw-name">Ctrl+Z / Ctrl+Shift+Z</span><span class="kw-desc">Undo / Redo</span></div>
<div class="kw-row"><span class="kw-name">Tab</span><span class="kw-desc">Insert 2 spaces</span></div>
<div class="kw-row"><span class="kw-name">Enter</span><span class="kw-desc">Auto-indents to match previous line, extra indent after <code>,</code></span></div>
<div class="kw-row"><span class="kw-name">// comment</span><span class="kw-desc">Line comments</span></div>
<div class="kw-row"><span class="kw-name">Blocks: , and .</span><span class="kw-desc">Comma opens a block, dot closes it. Parens are only for math grouping</span></div>

<h2>⚠ Gotchas &amp; Pitfalls</h2>
<div class="section-intro">Opcode has some parser behaviors that can cause subtle bugs. Read these before writing complex programs.</div>

<h2 style="font-size:14px;margin-top:10px;">Greedy argument parsing</h2>
<div class="section-intro">Builtins like <code>down</code>, <code>press</code>, <code>input</code>, <code>min</code>, <code>max</code>, <code>pow</code>, <code>randi</code>, <code>atan2</code>, <code>hitcirc</code>, <code>hitrect</code>, <code>dist</code>, and user functions parse their arguments as <b>full expressions</b>. This means <code>and</code>, <code>or</code>, <code>+</code>, <code>*</code>, comparisons, etc. get consumed as part of the argument — not as separate operators after it.</div>

<div class="kw-row"><span class="kw-name">✗ WRONG</span><span class="kw-desc"><code>if down 32 and cooldown &lt;= 0,</code><br>Parses as: <code>down(32 &amp;&amp; (cooldown &lt;= 0))</code> → checks key 0 or 1, not key 32!</span></div>
<div class="kw-row"><span class="kw-name">✓ RIGHT</span><span class="kw-desc"><code>if down 32,</code><br><code>&nbsp;&nbsp;if cooldown &lt;= 0,</code><br>Nest the conditions in separate <code>if</code> blocks.</span></div>

<div class="kw-row"><span class="kw-name">✗ WRONG</span><span class="kw-desc"><code>let d = min dist 100 + offset</code><br>Parses as: <code>min(dist, 100 + offset)</code> — the <code>+ offset</code> is part of min's second arg.</span></div>
<div class="kw-row"><span class="kw-name">✓ RIGHT</span><span class="kw-desc"><code>let d = (min dist 100) + offset</code><br>Use parens to limit what the builtin consumes.</span></div>

<div class="section-intro"><b>Rule of thumb:</b> if a builtin call is part of a larger expression, wrap it in parentheses. If combining <code>down</code>/<code>click</code> with <code>and</code>/<code>or</code>, use nested <code>if</code> blocks instead.</div>

<h2 style="font-size:14px;margin-top:10px;">Math builtins are different</h2>
<div class="section-intro">Single-arg math builtins (<code>sin</code>, <code>cos</code>, <code>sqrt</code>, <code>floor</code>, <code>abs</code>, <code>ceil</code>, <code>round</code>, <code>log</code>, <code>tan</code>) grab a <b>tight</b> argument — only an atom or unary, not a full expression. This means they naturally stop before <code>+</code>, <code>*</code>, etc.</div>
<div class="kw-row"><span class="kw-name">✓ Works</span><span class="kw-desc"><code>sin x * R</code> = <code>(sin x) * R</code> — sin grabs just <code>x</code></span></div>
<div class="kw-row"><span class="kw-name">✓ Parens</span><span class="kw-desc"><code>sin (x * R)</code> — use parens to pass a complex expression</span></div>
<div class="section-intro">Two-arg math builtins (<code>min</code>, <code>max</code>, <code>pow</code>, <code>atan2</code>, <code>randi</code>) also grab tight (unary-level) args, so <code>min a b + c</code> = <code>(min a b) + c</code>.</div>

<h2 style="font-size:14px;margin-top:10px;">Negative number literals</h2>
<div class="section-intro"><code>-1</code> is tokenized as the operator <code>-</code> and the number <code>1</code>, not as a single negative number. In most contexts this works fine, but inside <code>pick</code> you need parens:</div>
<div class="kw-row"><span class="kw-name">✗ WRONG</span><span class="kw-desc"><code>pick (x &lt; 0) -1 1</code> — the <code>-</code> is parsed as subtraction</span></div>
<div class="kw-row"><span class="kw-name">✓ RIGHT</span><span class="kw-desc"><code>pick (x &lt; 0) (0 - 1) 1</code> — wrap in parens or use <code>0 - 1</code></span></div>

<h2 style="font-size:14px;margin-top:10px;">Reserved words — don't use as variable names</h2>
<div class="section-intro">All ~85 keywords are reserved. Using one as a variable name causes a parse error. Common traps:</div>
<div class="kw-row"><span class="kw-name">✗ Can't use</span><span class="kw-desc"><code>let len = 5</code>, <code>let time = 0</code>, <code>let step = 1</code>, <code>let fill = 3</code>, <code>let line = 0</code>, <code>let key = 0</code>, <code>let min = 99</code>, <code>let max = 0</code>, <code>let set = 1</code>, <code>let get = 0</code>, <code>let new = 0</code></span></div>
<div class="kw-row"><span class="kw-name">✓ Use instead</span><span class="kw-desc"><code>let myLen = 5</code>, <code>let elapsed = 0</code>, <code>let stepN = 1</code>, <code>let myFill = 3</code>, etc.</span></div>
<div class="section-intro">Full keyword list: <code>func let const if else elif loop while for to step break return export store load pixel and or not array set get len struct new put of free key down mousex mousey click clear fill rect circle line text print printnum println press input drawnum clearinput pick width height data alpha atan2 min max pow dt stroke round beep tone drawtext push pop tan showpad switch case randi hsl band bor bxor bshl bshr strcmp strlen substr tri oval arc time rgba sprite spr</code></div>

<h2 style="font-size:14px;margin-top:10px;">Inline struct init only works with <code>let</code></h2>
<div class="section-intro">You can initialize struct fields inline, but only in a <code>let</code> declaration — not in a reassignment.</div>
<div class="kw-row"><span class="kw-name">✓ Works</span><span class="kw-desc"><code>let p = new obj 100 200 5 3</code> — creates and sets all fields</span></div>
<div class="kw-row"><span class="kw-name">✗ Doesn't work</span><span class="kw-desc"><code>p = new obj 100 200 5 3</code> — only creates the struct, values are ignored</span></div>
<div class="section-intro">For reassignment, create the struct empty and set fields individually, or design your code so the struct is always created with <code>let</code>.</div>

<h2 style="font-size:14px;margin-top:10px;">Struct field ambiguity</h2>
<div class="section-intro">When two structs share a field name (e.g. both have <code>x</code>), the compiler picks the first struct defined. This works when fields are at the same index in both structs, but can cause bugs if they aren't. Use unique field names or keep shared fields in the same position.</div>

<h2 style="font-size:14px;margin-top:10px;">print vs canvas drawing</h2>
<div class="section-intro"><code>print</code>, <code>printnum</code>, and <code>println</code> output to the <b>console tab</b>, not the canvas. To draw text on screen, use <code>text x y 72 69 76 76 79</code> (ASCII codes), <code>drawnum x y val</code> (numbers), or <code>drawtext arrname x y</code> (string arrays).</div>

<h2 style="font-size:14px;margin-top:10px;">Mobile game setup</h2>
<div class="section-intro">Call <code>showpad</code> in your <code>init</code> function to display the d-pad on touch devices. The d-pad arrows send keycodes 37–40 (←↑→↓) and the fire button sends 32 (space). Use <code>down 37</code>, <code>down 38</code>, etc. to read them — each on its own <code>if</code> line.</div>

<h2>3D (Three.js)</h2>
<div class="section-intro">GPU-accelerated 3D rendering. Call <code>mode3d</code> in <code>init</code> to switch to 3D. Objects created in <code>init</code> persist — call <code>mode3d</code> each tick to re-render.</div>
<div class="kw-row"><span class="kw-name">mode3d</span><span class="kw-desc">Switch to 3D mode and render the scene. Call in <code>init</code> and at end of <code>tick</code></span></div>
<div class="kw-row"><span class="kw-name">clear3d</span><span class="kw-desc">Remove all objects from the scene (use for dynamic scenes)</span></div>
<div class="kw-row"><span class="kw-name">color3d r g b</span><span class="kw-desc">Set material color for next object (0–255 each)</span></div>
<div class="kw-row"><span class="kw-name">box3d w h d</span><span class="kw-desc">Create a box. Width, height, depth in world units</span></div>
<div class="kw-row"><span class="kw-name">sphere3d r</span><span class="kw-desc">Create a sphere with radius r</span></div>
<div class="kw-row"><span class="kw-name">cyl3d r h</span><span class="kw-desc">Create a cylinder with radius r and height h</span></div>
<div class="kw-row"><span class="kw-name">pos3d x y z</span><span class="kw-desc">Set position of last created object. Y is up</span></div>
<div class="kw-row"><span class="kw-name">rot3d rx ry rz</span><span class="kw-desc">Set rotation of last object (radians)</span></div>
<div class="kw-row"><span class="kw-name">scale3d sx sy sz</span><span class="kw-desc">Set scale of last object</span></div>
<div class="kw-row"><span class="kw-name">cam3d x y z</span><span class="kw-desc">Set camera position</span></div>
<div class="kw-row"><span class="kw-name">lookat3d x y z</span><span class="kw-desc">Point camera at target position</span></div>
<div class="kw-row"><span class="kw-name">light3d x y z</span><span class="kw-desc">Move directional light</span></div>
<div class="kw-row"><span class="kw-name">ground3d w d</span><span class="kw-desc">Create a flat ground plane (width × depth)</span></div>
<div class="kw-row"><span class="kw-name">fog3d r g b</span><span class="kw-desc">Set fog/sky color. Also controls ambient + sun brightness and lamp glow (dark sky = lamps on)</span></div>
<div class="section-intro">Static scene: create objects in <code>init</code>, just move camera in <code>tick</code> + call <code>mode3d</code>. Dynamic scene: call <code>clear3d</code> then recreate objects each <code>tick</code>.</div>

<h2>3D Scene Generators</h2>
<div class="section-intro">One-line commands that build entire scenes. Call in <code>init</code>.</div>
<div class="kw-row"><span class="kw-name">city3d gx gz bs</span><span class="kw-desc">Generate a city grid. gx × gz blocks, bs = block size. Includes roads, sidewalks, crosswalks, buildings, parks, trees, lamps with day/night glow</span></div>
<div class="kw-row"><span class="kw-name">terrain3d w d hills</span><span class="kw-desc">Procedural terrain with elevation. Auto-colored by height: green valleys, brown hills, grey rock, white snow peaks</span></div>
<div class="kw-row"><span class="kw-name">forest3d w d density</span><span class="kw-desc">Ground plane with random trees (round, pine, bush), rocks. density = number of trees (max 500)</span></div>
<div class="kw-row"><span class="kw-name">track3d shape laps</span><span class="kw-desc">Racing circuit with barriers. shape: 0 = oval, 1 = figure-8. laps = number of lap markers</span></div>
<div class="kw-row"><span class="kw-name">ocean3d w d wh ws</span><span class="kw-desc">Animated water surface. w × d size, wh = wave height (default 1), ws = wave speed (default 1). Self-animating</span></div>
<div class="kw-row"><span class="kw-name">space3d stars</span><span class="kw-desc">Starfield skybox with colored stars and nebula clouds. Dark background, reduced lighting</span></div>
<div class="kw-row"><span class="kw-name">house3d w d floors</span><span class="kw-desc">Building with pitched roof, door, windows, interior divider walls, chimney. 1-5 floors</span></div>
<div class="kw-row"><span class="kw-name">collidex3d x z r</span><span class="kw-desc">Returns corrected x after pushing out of colliders. r = player radius. Use after moving camera</span></div>
<div class="kw-row"><span class="kw-name">collidez3d x z r</span><span class="kw-desc">Returns corrected z after pushing out of colliders. Call after collidex3d with same args</span></div>
<div class="section-intro">Usage: <code>camPx = collidex3d camPx camPz 0.4</code> then <code>camPz = collidez3d camPx camPz 0.4</code>. Scene generators (city3d, forest3d, track3d, house3d) auto-register colliders.</div>

<h2>3D Spherical Planet</h2>
<div class="section-intro">Walk on a spherical planet. Camera auto-orients so "up" always points away from the planet center.</div>
<div class="kw-row"><span class="kw-name">planet3d r trees</span><span class="kw-desc">Create a walkable planet at origin with radius r, tree count. Has mountains, oceans, atmosphere. Call multiple times for multi-planet systems</span></div>
<div class="kw-row"><span class="kw-name">ppos3d x y z</span><span class="kw-desc">Position the last created planet at x y z</span></div>
<div class="kw-row"><span class="kw-name">grav3d x y z</span><span class="kw-desc">Returns gravitational pull strength toward nearest planet at position. Falls off with distance²</span></div>
<div class="kw-row"><span class="kw-name">surfx3d x y z</span><span class="kw-desc">Snap position to planet surface — returns corrected x (1.6 units above surface)</span></div>
<div class="kw-row"><span class="kw-name">surfy3d x y z</span><span class="kw-desc">Snap position to planet surface — returns corrected y</span></div>
<div class="kw-row"><span class="kw-name">surfz3d x y z</span><span class="kw-desc">Snap position to planet surface — returns corrected z</span></div>
<div class="kw-row"><span class="kw-name">upx3d x y z</span><span class="kw-desc">Up vector x component at position (normalized direction from planet center)</span></div>
<div class="kw-row"><span class="kw-name">upy3d x y z</span><span class="kw-desc">Up vector y component at position</span></div>
<div class="kw-row"><span class="kw-name">upz3d x y z</span><span class="kw-desc">Up vector z component at position</span></div>
<div class="section-intro">Movement pattern: compute forward/right vectors from up × heading, move along tangent plane, then snap to surface with surfx3d/surfy3d/surfz3d each tick. For jetpack: stop snapping, apply gravity with <code>grav3d</code>, add thrust along up vector.</div>
<div class="section-intro">Performance tiers: <code>city3d 5 5 20</code> (smooth mobile), <code>city3d 10 10 16</code> (medium), <code>city3d 20 20 14</code> (full city, brief init twitch)</div>

<div class="tip">New in v0.5: <code>while</code>, <code>elif</code>, <code>for...step</code>, <code>data "string"</code>, <code>drawstr</code>, <code>camera</code>, <code>hitcirc</code>/<code>hitrect</code>/<code>dist</code>, <code>play</code> (BGM), <code>frame</code> (sprite anim), 3D rendering, <code>city3d</code> scene generator, day/night cycle, <code>terrain3d</code>, <code>forest3d</code>, <code>track3d</code>, <code>ocean3d</code>, <code>space3d</code>, <code>house3d</code> scene generators, 39 examples</div>

  const saves = JSON.parse(localStorage.getItem('opcode_saves') || '{}');

// Load from localStorage
document.getElementById('btn-load').addEventListener('click', () => {
  const saves = JSON.parse(localStorage.getItem('opcode_saves') || '{}');
  const names = Object.keys(saves);
  if (names.length === 0) { statusText.textContent = 'no saved programs'; return; }
  const name = prompt('Load:\\n' + names.join('\\n'));
  if (!name || !saves[name]) { statusText.textContent = 'not found'; return; }
  editor.value = saves[name];
  undoStack.length = 0; redoStack.length = 0; lastUndoValue = editor.value;
  clearError(); refresh();
  statusText.textContent = `loaded: ${name}`;
});

  'store','load','pixel','and','or','not',
  'array','set','get','len',
  'struct','new','put','of','free',
  'key','down','mousex','mousey','click',
  'clear','fill','rect','circle','line','text',
  'printnum','println','print','press','input','drawnum','clearinput','const','pick','width','height','for','to','data','alpha','atan2','min','max','pow','dt','stroke','round','beep','tone','drawtext','push','pop','tan','showpad','switch','case','randi','hsl','band','bor','bxor','bshl','bshr','strcmp','strlen','substr',
  'tri','oval','arc','time','rgba','sprite','spr',
  'while','elif','step',
  'hitcirc','hitrect','dist','drawstr','camera','play','frame',
  'box3d','sphere3d','cyl3d','pos3d','rot3d','scale3d','color3d','cam3d','lookat3d','light3d','clear3d','fog3d','ground3d','mode3d','city3d',
  'terrain3d','forest3d','track3d','ocean3d','space3d','house3d',
